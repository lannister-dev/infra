---
- name: Ensure python3 exists for Ansible modules
  ansible.builtin.raw: |
    set -e
    test -x /usr/bin/python3 || (apt-get update -y && apt-get install -y python3)
  changed_when: false

- name: Install Docker packages
  ansible.builtin.apt:
    update_cache: true
    update_cache_retries: 5
    update_cache_retry_max_delay: 12
    lock_timeout: 600
    name: "{{ ['docker.io'] + (['wireguard', 'wireguard-tools'] if install_wireguard else []) }}"
    state: present

- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ desired_hostname }}"

- name: Verify effective hostname
  ansible.builtin.command:
    argv:
      - hostnamectl
      - --static
  register: effective_hostname_cmd
  changed_when: false

- name: Ensure effective hostname matches desired
  ansible.builtin.assert:
    that:
      - (effective_hostname_cmd.stdout | trim) == desired_hostname
    fail_msg: >-
      Expected hostname {{ desired_hostname }}, got {{ effective_hostname_cmd.stdout | trim }}.

- name: Check whether UFW is installed
  ansible.builtin.command:
    argv: [bash, -lc, "command -v ufw >/dev/null 2>&1"]
  register: ufw_present_cmd
  changed_when: false
  failed_when: false

- name: Read UFW status
  ansible.builtin.command:
    argv: [ufw, status]
  register: ufw_status_cmd
  changed_when: false
  failed_when: false
  when: ufw_present_cmd.rc == 0

- name: Allow required ports in UFW when active
  ansible.builtin.command:
    argv: [ufw, allow, "{{ item }}"]
  loop: "{{ ufw_ports }}"
  when:
    - ufw_present_cmd.rc == 0
    - ufw_status_cmd.rc == 0
    - "'Status: active' in ufw_status_cmd.stdout"
  changed_when: false
