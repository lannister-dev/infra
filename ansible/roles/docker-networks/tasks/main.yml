---
- name: Check overlay network existence
  ansible.builtin.command:
    argv:
      - docker
      - network
      - inspect
      - "{{ item.name }}"
  loop: "{{ overlay_networks }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.condition | default(true) | bool
  register: network_inspect_results
  failed_when: false
  changed_when: false

- name: Create missing overlay networks
  ansible.builtin.command:
    argv:
      - docker
      - network
      - create
      - --driver
      - overlay
      - --attachable
      - "{{ item.item.name }}"
  loop: "{{ network_inspect_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - item.item.condition | default(true) | bool
    - item.rc is defined
    - item.rc != 0
  changed_when: true
