---
- name: Check local swarm state
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{.Swarm.LocalNodeState}}' }}"
  register: swarm_local_state
  changed_when: false

- name: Join swarm if not active
  ansible.builtin.command:
    argv:
      - docker
      - swarm
      - join
      - --token
      - "{{ join_token }}"
      - "{{ manager_address }}"
  when: swarm_local_state.stdout | trim != "active"
  changed_when: true
  no_log: true

- name: Read swarm node id
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{.Swarm.NodeID}}' }}"
  register: swarm_node_id_cmd
  changed_when: false

- name: Store swarm node id
  ansible.builtin.set_fact:
    swarm_node_id: "{{ swarm_node_id_cmd.stdout | trim }}"
