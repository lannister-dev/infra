---
repo_root: "{{ lookup('env', 'REPO_ROOT') | default('/opt/vpn-infra', true) }}"

enable_vpn_dev_stack: "{{ (lookup('env', 'ENABLE_VPN_DEV_STACK') | default('false', true)) | bool }}"
deploy_probe_stack: "{{ (lookup('env', 'DEPLOY_PROBE_STACK') | default('true', true)) | bool }}"
deploy_nats_stack: "{{ (lookup('env', 'DEPLOY_NATS_STACK') | default('true', true)) | bool }}"
deploy_data_dev_stack: "{{ (lookup('env', 'DEPLOY_DATA_DEV_STACK') | default('false', true)) | bool }}"
deploy_data_prod_stack: "{{ (lookup('env', 'DEPLOY_DATA_PROD_STACK') | default('false', true)) | bool }}"
run_sanity_check: "{{ (lookup('env', 'RUN_SANITY_CHECK') | default('true', true)) | bool }}"
allow_empty_vpn_nodes: "{{ (lookup('env', 'ALLOW_EMPTY_VPN_NODES') | default('false', true)) | bool }}"

# Config names are resolved by Terraform (content-hash based) and passed via env.
prometheus_config_name: "{{ lookup('env', 'PROMETHEUS_CONFIG_NAME') }}"
grafana_ini_config_name: "{{ lookup('env', 'GRAFANA_INI_CONFIG_NAME') }}"
grafana_datasources_config_name: "{{ lookup('env', 'GRAFANA_DATASOURCES_CONFIG_NAME') }}"
grafana_dashboards_config_name: "{{ lookup('env', 'GRAFANA_DASHBOARDS_CONFIG_NAME') }}"
xray_config_name: "{{ lookup('env', 'XRAY_CONFIG_NAME') }}"
xray_config_dev_name: "{{ lookup('env', 'XRAY_CONFIG_DEV_NAME') | default('', true) }}"
vpn_fallback_index_config_name: "{{ lookup('env', 'VPN_FALLBACK_INDEX_CONFIG_NAME') }}"
vpn_fallback_nginx_config_name: "{{ lookup('env', 'VPN_FALLBACK_NGINX_CONFIG_NAME') }}"
vault_config_name: "{{ lookup('env', 'VAULT_CONFIG_NAME') }}"

vpn_domain: "{{ lookup('env', 'VPN_DOMAIN') | default('', true) }}"
vpn_ws_path: "{{ lookup('env', 'VPN_WS_PATH') | default('/api/v1/stream', true) }}"
vpn_xhttp_path: "{{ lookup('env', 'VPN_XHTTP_PATH') | default('/api/v1/mobile', true) }}"
vpn_dev_domain: "{{ lookup('env', 'VPN_DEV_DOMAIN') | default(vpn_domain, true) }}"
vpn_dev_ws_path: "{{ lookup('env', 'VPN_DEV_WS_PATH') | default(vpn_ws_path, true) }}"
vpn_dev_xhttp_path: "{{ lookup('env', 'VPN_DEV_XHTTP_PATH') | default(vpn_xhttp_path, true) }}"
vpn_fallback_domain: "{{ lookup('env', 'VPN_FALLBACK_DOMAIN') | default(vpn_dev_domain, true) }}"
vpn_dev_network_name: "{{ lookup('env', 'VPN_DEV_NETWORK_NAME') | default('vpn-dev-net', true) }}"

# Service-specific credentials (passed as explicit env to containers, not via env_file)
cf_dns_api_token: "{{ lookup('env', 'CF_DNS_API_TOKEN') }}"
gf_security_admin_user: "{{ lookup('env', 'GF_SECURITY_ADMIN_USER') | default('admin', true) }}"
gf_security_admin_password: "{{ lookup('env', 'GF_SECURITY_ADMIN_PASSWORD') }}"
gf_users_allow_sign_up: "{{ lookup('env', 'GF_USERS_ALLOW_SIGN_UP') | default('false', true) }}"
control_plane_url: "{{ lookup('env', 'CONTROL_PLANE_URL') | default('', true) }}"
traefik_acme_email: "{{ lookup('env', 'TRAEFIK_ACME_EMAIL') | default('', true) }}"
traefik_dashboard_host: "{{ lookup('env', 'TRAEFIK_DASHBOARD_HOST') | default('', true) }}"
traefik_dashboard_auth_users: "{{ lookup('env', 'TRAEFIK_DASHBOARD_AUTH_USERS') | default('', true) }}"
traefik_web_forwarded_headers_insecure: "{{ lookup('env', 'TRAEFIK_WEB_FORWARDED_HEADERS_INSECURE') | default('false', true) }}"
traefik_websecure_forwarded_headers_insecure: "{{ lookup('env', 'TRAEFIK_WEBSECURE_FORWARDED_HEADERS_INSECURE') | default('false', true) }}"
prometheus_host: "{{ lookup('env', 'PROMETHEUS_HOST') | default('', true) }}"
prometheus_auth_users: "{{ lookup('env', 'PROMETHEUS_AUTH_USERS') | default('', true) }}"
grafana_host: "{{ lookup('env', 'GRAFANA_HOST') | default('', true) }}"
nats_monitor_host: "{{ lookup('env', 'NATS_MONITOR_HOST') | default('', true) }}"
nats_monitor_auth_users: "{{ lookup('env', 'NATS_MONITOR_AUTH_USERS') | default('', true) }}"

# External data services precheck (for services deployed outside this repo, e.g. control-api).
external_data_precheck_enabled: "{{ (lookup('env', 'EXTERNAL_DATA_PRECHECK_ENABLED') | default('false', true)) | bool }}"
external_postgres_host: "{{ lookup('env', 'EXTERNAL_POSTGRES_HOST') | default('', true) }}"
external_postgres_port: "{{ (lookup('env', 'EXTERNAL_POSTGRES_PORT') | default('5432', true)) | int }}"
external_redis_host: "{{ lookup('env', 'EXTERNAL_REDIS_HOST') | default('', true) }}"
external_redis_port: "{{ (lookup('env', 'EXTERNAL_REDIS_PORT') | default('6379', true)) | int }}"
external_data_precheck_timeout: "{{ (lookup('env', 'EXTERNAL_DATA_PRECHECK_TIMEOUT') | default('10', true)) | int }}"

traefik_image_tag: "{{ lookup('env', 'TRAEFIK_IMAGE_TAG') | default('v3.6', true) }}"
prometheus_image_tag: "{{ lookup('env', 'PROMETHEUS_IMAGE_TAG') | default('v2.55.1', true) }}"
grafana_image_tag: "{{ lookup('env', 'GRAFANA_IMAGE_TAG') | default('11.5.2', true) }}"
xray_image_tag: "{{ lookup('env', 'XRAY_IMAGE_TAG') | default('latest', true) }}"
nginx_alpine_image_tag: "{{ lookup('env', 'NGINX_ALPINE_IMAGE_TAG') | default('1.27.5-alpine', true) }}"
swarmpit_image_tag: "{{ lookup('env', 'SWARMPIT_IMAGE_TAG') | default('latest', true) }}"
swarmpit_agent_image_tag: "{{ lookup('env', 'SWARMPIT_AGENT_IMAGE_TAG') | default('2.2', true) }}"
nats_image_tag: "{{ lookup('env', 'NATS_IMAGE_TAG') | default('2.11-alpine', true) }}"
nats_exporter_image_tag: "{{ lookup('env', 'NATS_EXPORTER_IMAGE_TAG') | default('0.19.1', true) }}"
nats_auth_token: "{{ lookup('env', 'NATS_AUTH_TOKEN') | default('', true) }}"
postgres_image_tag: "{{ lookup('env', 'POSTGRES_IMAGE_TAG') | default('16-alpine', true) }}"
redis_image_tag: "{{ lookup('env', 'REDIS_IMAGE_TAG') | default('7-alpine', true) }}"
data_dev_postgres_db: "{{ lookup('env', 'DEV_POSTGRES_DB') | default(lookup('env', 'DATA_DEV_POSTGRES_DB'), true) | default('vpn_control_dev', true) }}"
data_dev_postgres_user: "{{ lookup('env', 'DEV_POSTGRES_USER') | default(lookup('env', 'DATA_DEV_POSTGRES_USER'), true) | default('vpn_dev_user', true) }}"
data_dev_postgres_password: "{{ lookup('env', 'DEV_POSTGRES_PASSWORD') | default(lookup('env', 'DATA_DEV_POSTGRES_PASSWORD'), true) | default('', true) }}"
data_dev_redis_password: "{{ lookup('env', 'DEV_REDIS_PASSWORD') | default(lookup('env', 'DATA_DEV_REDIS_PASSWORD'), true) | default('', true) }}"
data_prod_postgres_db: "{{ lookup('env', 'PROD_POSTGRES_DB') | default('vpn_control', true) }}"
data_prod_postgres_user: "{{ lookup('env', 'PROD_POSTGRES_USER') | default('vpn_prod_user', true) }}"
data_prod_postgres_password: "{{ lookup('env', 'PROD_POSTGRES_PASSWORD') | default('', true) }}"
data_prod_redis_password: "{{ lookup('env', 'PROD_REDIS_PASSWORD') | default('', true) }}"
data_dev_network_name: "{{ lookup('env', 'DATA_DEV_NETWORK_NAME') | default('data-dev-net', true) }}"
data_prod_network_name: "{{ lookup('env', 'DATA_PROD_NETWORK_NAME') | default('data-prod-net', true) }}"
node_agent_image_ref: "{{ lookup('env', 'NODE_AGENT_IMAGE_REF') | default('harbor.lannister-dev.ru/vpn-service/node-agent:prod', true) }}"
node_agent_image_ref_dev: "{{ lookup('env', 'NODE_AGENT_IMAGE_REF_DEV') | default(node_agent_image_ref, true) }}"
