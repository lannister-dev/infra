---
repo_root: "{{ lookup('env', 'REPO_ROOT') | default('/opt/vpn-infra', true) }}"

enable_vpn_dev_stack: "{{ (lookup('env', 'ENABLE_VPN_DEV_STACK') | default('false', true)) | bool }}"
deploy_probe_stack: "{{ (lookup('env', 'DEPLOY_PROBE_STACK') | default('true', true)) | bool }}"
run_sanity_check: "{{ (lookup('env', 'RUN_SANITY_CHECK') | default('true', true)) | bool }}"
allow_empty_vpn_nodes: "{{ (lookup('env', 'ALLOW_EMPTY_VPN_NODES') | default('false', true)) | bool }}"

# Config names are resolved by Terraform (content-hash based) and passed via env.
prometheus_config_name: "{{ lookup('env', 'PROMETHEUS_CONFIG_NAME') }}"
grafana_ini_config_name: "{{ lookup('env', 'GRAFANA_INI_CONFIG_NAME') }}"
grafana_datasources_config_name: "{{ lookup('env', 'GRAFANA_DATASOURCES_CONFIG_NAME') }}"
grafana_dashboards_config_name: "{{ lookup('env', 'GRAFANA_DASHBOARDS_CONFIG_NAME') }}"
xray_config_name: "{{ lookup('env', 'XRAY_CONFIG_NAME') }}"
xray_config_dev_name: "{{ lookup('env', 'XRAY_CONFIG_DEV_NAME') | default('', true) }}"
vpn_fallback_index_config_name: "{{ lookup('env', 'VPN_FALLBACK_INDEX_CONFIG_NAME') }}"
vpn_fallback_nginx_config_name: "{{ lookup('env', 'VPN_FALLBACK_NGINX_CONFIG_NAME') }}"

vpn_domain: "{{ lookup('env', 'VPN_DOMAIN') | default('', true) }}"
vpn_ws_path: "{{ lookup('env', 'VPN_WS_PATH') | default('/api/v1/stream', true) }}"
vpn_xhttp_path: "{{ lookup('env', 'VPN_XHTTP_PATH') | default('/api/v1/mobile', true) }}"
vpn_dev_domain: "{{ lookup('env', 'VPN_DEV_DOMAIN') | default(vpn_domain, true) }}"
vpn_dev_ws_path: "{{ lookup('env', 'VPN_DEV_WS_PATH') | default(vpn_ws_path, true) }}"
vpn_dev_xhttp_path: "{{ lookup('env', 'VPN_DEV_XHTTP_PATH') | default(vpn_xhttp_path, true) }}"
vpn_fallback_domain: "{{ lookup('env', 'VPN_FALLBACK_DOMAIN') | default(vpn_dev_domain, true) }}"

# Service-specific credentials (passed as explicit env to containers, not via env_file)
cf_dns_api_token: "{{ lookup('env', 'CF_DNS_API_TOKEN') }}"
gf_security_admin_user: "{{ lookup('env', 'GF_SECURITY_ADMIN_USER') | default('admin', true) }}"
gf_security_admin_password: "{{ lookup('env', 'GF_SECURITY_ADMIN_PASSWORD') }}"
gf_users_allow_sign_up: "{{ lookup('env', 'GF_USERS_ALLOW_SIGN_UP') | default('false', true) }}"
control_plane_url: "{{ lookup('env', 'CONTROL_PLANE_URL') | default('', true) }}"

traefik_image_tag: "{{ lookup('env', 'TRAEFIK_IMAGE_TAG') | default('v3.6', true) }}"
prometheus_image_tag: "{{ lookup('env', 'PROMETHEUS_IMAGE_TAG') | default('v2.55.1', true) }}"
grafana_image_tag: "{{ lookup('env', 'GRAFANA_IMAGE_TAG') | default('11.5.2', true) }}"
xray_image_tag: "{{ lookup('env', 'XRAY_IMAGE_TAG') | default('v1.8.24', true) }}"
nginx_alpine_image_tag: "{{ lookup('env', 'NGINX_ALPINE_IMAGE_TAG') | default('1.27.5-alpine', true) }}"
swarmpit_image_tag: "{{ lookup('env', 'SWARMPIT_IMAGE_TAG') | default('1.10.2', true) }}"
swarmpit_agent_image_tag: "{{ lookup('env', 'SWARMPIT_AGENT_IMAGE_TAG') | default('1.9.2', true) }}"
