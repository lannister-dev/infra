---
- name: Reconcile VPN nodes (manager phase)
  hosts: "swarm_managers[0]"
  gather_facts: false
  become: true
  any_errors_fatal: true

  vars_files:
    - ../inventory/generated/vpn_nodes.yml
  vars:
    repo_root: "{{ lookup('env', 'REPO_ROOT') | default(playbook_dir + '/../..', true) }}"
    ssh_private_key_file_effective: "{{ lookup('env', 'ANSIBLE_SSH_PRIVATE_KEY_FILE') | default('', true) | trim }}"
    ssh_keys_dir_effective: "{{ lookup('env', 'ANSIBLE_SSH_KEYS_DIR') | default('', true) | trim }}"
    ssh_auth_retries_effective: "{{ lookup('env', 'ANSIBLE_SSH_AUTH_RETRIES') | default('18', true) | int }}"
    ssh_auth_delay_effective: "{{ lookup('env', 'ANSIBLE_SSH_AUTH_DELAY') | default('5', true) | int }}"
    ssh_auth_fallback_users_csv_effective: "{{ lookup('env', 'ANSIBLE_SSH_AUTH_FALLBACK_USERS') | default('ubuntu,debian,ec2-user,cloud-user,admin', true) }}"
    ssh_auth_fallback_users_effective: "{{ ssh_auth_fallback_users_csv_effective.split(',') | map('trim') | reject('equalto', '') | list }}"
    allow_empty_vpn_nodes_effective: >-
      {{
        (
          allow_empty_vpn_nodes
          | default(lookup('env', 'ALLOW_EMPTY_VPN_NODES') | default('false', true))
        ) | bool
      }}

  tasks:
    - name: Ensure swarm_managers group has at least one host
      ansible.builtin.assert:
        that:
          - (groups['swarm_managers'] | default([]) | length) > 0
        fail_msg: "Inventory group 'swarm_managers' is empty."

    - name: Ensure vpn_nodes variable exists
      ansible.builtin.assert:
        that:
          - vpn_nodes is defined
          - vpn_nodes is iterable
        fail_msg: "Generated inventory file ansible/inventory/generated/vpn_nodes.yml is missing or invalid."

    - name: Ensure WireGuard config exists on manager
      ansible.builtin.stat:
        path: /etc/wireguard/wg0.conf
      register: wg_conf
      failed_when: not wg_conf.stat.exists

    - name: Ensure required manager binaries are present
      ansible.builtin.command:
        argv: [bash, -lc, "command -v docker >/dev/null 2>&1 && command -v wg >/dev/null 2>&1"]
      changed_when: "false"

    - name: Build desired enabled node lists
      ansible.builtin.set_fact:
        desired_enabled_nodes: "{{ vpn_nodes | selectattr('enabled', 'equalto', true) | list }}"
        desired_enabled_peer_names: "{{ vpn_nodes | selectattr('enabled', 'equalto', true) | map(attribute='name') | unique | list }}"

    - name: Validate desired node schema
      ansible.builtin.assert:
        that:
          - item.name is match('^[a-zA-Z0-9._-]+$')
          - item.public_ip | length > 0
          - item.channel in ['prod', 'dev']
          - (item.ssh_port | int) > 0
          - item.ssh_key_ref is defined
          - (item.ssh_key_ref | default('default', true)) is match('^[a-zA-Z0-9._-]+$')
        fail_msg: "Invalid node entry: {{ item }}"
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure SSH auth material is configured
      ansible.builtin.assert:
        that:
          - ssh_keys_dir_effective != '' or ssh_private_key_file_effective != ''
        fail_msg: >-
          SSH key is not configured. Set ANSIBLE_SSH_KEYS_DIR (recommended, per-node keys)
          or ANSIBLE_SSH_PRIVATE_KEY_FILE (single key fallback).

    - name: Validate SSH auth retry settings
      ansible.builtin.assert:
        that:
          - (ssh_auth_retries_effective | int) > 0
          - (ssh_auth_delay_effective | int) > 0
        fail_msg: >-
          Invalid SSH auth retry settings. ANSIBLE_SSH_AUTH_RETRIES and ANSIBLE_SSH_AUTH_DELAY
          must be positive integers.

    - name: Check per-node SSH key file exists on controller
      ansible.builtin.stat:
        path: "{{ ssh_keys_dir_effective }}/{{ item.ssh_key_ref | default('default', true) | trim }}"
      delegate_to: localhost
      become: false
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.ssh_key_ref | default('default', true) }}"
      when: ssh_keys_dir_effective != ''
      register: ssh_key_file_stat_result
      changed_when: false

    - name: Ensure per-node SSH key file exists on controller
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
        fail_msg: >-
          Missing SSH key for node {{ item.item.name }} (ref={{ item.item.ssh_key_ref | default('default', true) }}):
          expected file {{ ssh_keys_dir_effective }}/{{ item.item.ssh_key_ref | default('default', true) | trim }}.
      loop: "{{ ssh_key_file_stat_result.results | default([]) }}"
      loop_control:
        label: "{{ item.item.name }} -> {{ item.item.ssh_key_ref | default('default', true) }}"
      when: ssh_keys_dir_effective != ''

    - name: Prevent accidental empty desired node set
      ansible.builtin.assert:
        that:
          - (desired_enabled_peer_names | length) > 0 or allow_empty_vpn_nodes_effective
        fail_msg: "Desired enabled VPN node set is empty. Set ALLOW_EMPTY_VPN_NODES=true only for intentional full decommission."

    - name: List current swarm VPN node ids
      ansible.builtin.command:
        argv: [docker, node, ls, --filter, label=role=vpn, -q]
      register: current_vpn_node_ids
      changed_when: "false"

    - name: Read peer_name label from current swarm VPN nodes
      ansible.builtin.command:
        argv:
          - docker
          - node
          - inspect
          - --format
          - "{{ '{{ index .Spec.Labels \"peer_name\" }}' }}"
          - "{{ item }}"
      loop: "{{ current_vpn_node_ids.stdout_lines }}"
      loop_control:
        label: "{{ item }}"
      register: current_peer_name_results
      changed_when: "false"

    - name: Build current/stale peer lists
      ansible.builtin.set_fact:
        unlabeled_vpn_node_ids: >-
          {{
            current_peer_name_results.results
            | selectattr('stdout', 'defined')
            | selectattr('stdout', 'in', ['', '<no value>'])
            | map(attribute='item')
            | list
          }}
        current_peer_names: >-
          {{
            current_peer_name_results.results
            | map(attribute='stdout')
            | map('trim')
            | reject('in', ['', '<no value>'])
            | unique
            | list
          }}

    - name: Ensure all role=vpn nodes have peer_name label
      ansible.builtin.assert:
        that:
          - unlabeled_vpn_node_ids | length == 0
        fail_msg: "Found role=vpn swarm nodes without peer_name label: {{ unlabeled_vpn_node_ids | join(', ') }}"

    - name: Read WireGuard peer names from manager config
      ansible.builtin.shell: |
        set -Eeuo pipefail
        awk '/^# .* start$/{print $2}' /etc/wireguard/wg0.conf || true
      args:
        executable: /bin/bash
      register: current_wg_peer_names_cmd
      changed_when: "false"

    - name: Build stale peer list (swarm + WireGuard)
      ansible.builtin.set_fact:
        stale_peer_names: >-
          {{
            (current_peer_names | union(
              current_wg_peer_names_cmd.stdout_lines | map('trim') | reject('equalto', '') | list
            ) | unique) | difference(desired_enabled_peer_names)
          }}

    - name: Ensure WireGuard peer and client config exists for desired enabled nodes
      ansible.builtin.command:
        argv:
          - bash
          - "{{ repo_root }}/wireguard/manager/reconcile-peer.sh"
          - --root
          - "{{ repo_root }}"
          - --name
          - "{{ item.name }}"
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }}"
      register: wg_peer_result
      changed_when: "wg_peer_result.rc == 10"
      failed_when: wg_peer_result.rc not in [0, 10]
      no_log: true

    - name: Ensure local SSH known_hosts directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') + '/.ssh' }}"
        state: directory
        mode: "0700"

    - name: Remove stale SSH host keys for desired nodes
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -R
          - "{{ item.public_ip }}"
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.public_ip }}"
      changed_when: "false"
      failed_when: "false"

    - name: Remove stale SSH host keys with port form for desired nodes
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -R
          - "[{{ item.public_ip }}]:{{ item.ssh_port }}"
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }} -> [{{ item.public_ip }}]:{{ item.ssh_port }}"
      changed_when: "false"
      failed_when: "false"

    - name: Wait for SSH port to become reachable on desired nodes
      ansible.builtin.wait_for:
        host: "{{ item.public_ip }}"
        port: "{{ item.ssh_port | int }}"
        state: started
        timeout: 300
        delay: 3
        sleep: 5
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.public_ip }}:{{ item.ssh_port }}"
      changed_when: "false"

    - name: Scan SSH host keys for desired nodes
      ansible.builtin.command:
        argv:
          - ssh-keyscan
          - -T
          - "10"
          - -p
          - "{{ item.ssh_port | string }}"
          - "{{ item.public_ip }}"
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.public_ip }}:{{ item.ssh_port }}"
      register: scan_known_host_result
      retries: 12
      delay: 5
      until: scan_known_host_result.rc == 0 and (scan_known_host_result.stdout | trim) != ""
      changed_when: "false"
      failed_when: scan_known_host_result.rc != 0 or (scan_known_host_result.stdout | trim) == ""

    - name: Save scanned SSH host keys into known_hosts
      ansible.builtin.known_hosts:
        path: "{{ lookup('env', 'HOME') + '/.ssh/known_hosts' }}"
        name: "{{ '[%s]:%s' | format(item.item.public_ip, item.item.ssh_port) if (item.item.ssh_port | int) != 22 else item.item.public_ip }}"
        key: "{{ item.stdout }}"
        state: present
      loop: "{{ scan_known_host_result.results }}"
      loop_control:
        label: "{{ item.item.name }} -> {{ item.item.public_ip }}"

    - name: Verify SSH authentication works for desired nodes
      ansible.builtin.shell: |
        set -Eeuo pipefail
        for ssh_user_candidate in {{ (([item.ssh_user] + ssh_auth_fallback_users_effective) | unique | map('quote') | join(' ')) }}; do
          if ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i {{ ((ssh_keys_dir_effective ~ '/' ~ (item.ssh_key_ref | default('default', true) | trim)) if ssh_keys_dir_effective != '' else ssh_private_key_file_effective) | quote }} \
            -p {{ (item.ssh_port | string) | quote }} \
            "${ssh_user_candidate}@{{ item.public_ip }}" \
            true >/dev/null 2>&1; then
            printf '%s\n' "${ssh_user_candidate}"
            exit 0
          fi
        done
        echo "SSH auth failed for node {{ item.name }}@{{ item.public_ip }} with users: {{ (([item.ssh_user] + ssh_auth_fallback_users_effective) | unique | join(', ')) }}." \
          "If this node was reprovisioned, ensure key_pair/authorized_keys matches ssh_key_ref={{ item.ssh_key_ref | default('default', true) }} or replace the VM." >&2
        exit 1
      args:
        executable: /bin/bash
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.public_ip }}"
      register: ssh_auth_check_result
      retries: "{{ ssh_auth_retries_effective | int }}"
      delay: "{{ ssh_auth_delay_effective | int }}"
      until: ssh_auth_check_result.rc == 0
      changed_when: false

    - name: Build effective SSH user map from auth checks
      ansible.builtin.set_fact:
        effective_ssh_users: "{{ (effective_ssh_users | default({})) | combine({item.item.name: (item.stdout | trim)}) }}"
      loop: "{{ ssh_auth_check_result.results }}"
      loop_control:
        label: "{{ item.item.name }} -> {{ item.stdout | trim }}"

    - name: Show discovered SSH user overrides
      ansible.builtin.debug:
        msg: >-
          Node {{ item.name }} uses discovered SSH user {{ effective_ssh_users[item.name] }}
          (configured ssh_user={{ item.ssh_user }}).
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - effective_ssh_users is defined
        - effective_ssh_users[item.name] is defined
        - effective_ssh_users[item.name] != item.ssh_user

    - name: Register desired enabled nodes as dynamic inventory targets
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: vpn_targets
        ansible_host: "{{ item.public_ip }}"
        ansible_user: "{{ (effective_ssh_users[item.name] if (effective_ssh_users is defined and effective_ssh_users[item.name] is defined) else item.ssh_user) }}"
        ansible_port: "{{ item.ssh_port }}"
        ansible_ssh_private_key_file: >-
          {{
            (ssh_keys_dir_effective ~ '/' ~ (item.ssh_key_ref | default('default', true) | trim))
            if ssh_keys_dir_effective != ''
            else (ssh_private_key_file_effective if ssh_private_key_file_effective != '' else omit)
          }}
        peer_name: "{{ item.name }}"
        node_channel: "{{ item.channel }}"
      loop: "{{ desired_enabled_nodes }}"

    - name: Get swarm join token
      ansible.builtin.command:
        argv: [docker, swarm, join-token, worker, -q]
      register: swarm_worker_join_token
      changed_when: "false"
      no_log: true

    - name: Get swarm manager address
      ansible.builtin.command:
        argv:
          - docker
          - node
          - inspect
          - self
          - --format
          - "{{ '{{.ManagerStatus.Addr}}' }}"
      register: swarm_manager_addr
      changed_when: "false"

- name: Reconcile VPN nodes (remote host bootstrap/join phase)
  hosts: vpn_targets
  gather_facts: false
  become: true
  any_errors_fatal: true
  vars:
    primary_manager: "{{ groups['swarm_managers'][0] }}"

  handlers:
    - name: Restart wg-quick wg0
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: restarted

  tasks:
    - name: Ensure python3 exists for Ansible modules
      ansible.builtin.raw: |
        set -e
        test -x /usr/bin/python3 || (apt-get update -y && apt-get install -y python3)
      changed_when: "false"

    - name: Install Docker and WireGuard packages
      ansible.builtin.apt:
        update_cache: true
        update_cache_retries: 5
        update_cache_retry_max_delay: 12
        lock_timeout: 600
        name:
          - docker.io
          - wireguard
          - wireguard-tools
        state: present

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Read WireGuard client config from manager
      ansible.builtin.slurp:
        src: "/etc/wireguard/clients/{{ peer_name }}-wg0.conf"
      delegate_to: "{{ primary_manager }}"
      register: wg_client_conf_raw

    - name: Install WireGuard config on remote node
      ansible.builtin.copy:
        content: "{{ wg_client_conf_raw.content | b64decode }}"
        dest: /etc/wireguard/wg0.conf
        owner: root
        group: root
        mode: "0600"
      notify: Restart wg-quick wg0

    - name: Ensure WireGuard service is enabled and running
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: started
        enabled: true

    - name: Check local swarm state
      ansible.builtin.command:
        argv:
          - docker
          - info
          - --format
          - "{{ '{{.Swarm.LocalNodeState}}' }}"
      register: swarm_local_state
      changed_when: "false"

    - name: Join swarm as worker if not active
      ansible.builtin.command:
        argv:
          - docker
          - swarm
          - join
          - --token
          - "{{ hostvars[primary_manager].swarm_worker_join_token.stdout | trim }}"
          - "{{ hostvars[primary_manager].swarm_manager_addr.stdout | trim }}"
      when: swarm_local_state.stdout | trim != "active"
      changed_when: "true"
      no_log: true

    - name: Read swarm node id
      ansible.builtin.command:
        argv:
          - docker
          - info
          - --format
          - "{{ '{{.Swarm.NodeID}}' }}"
      register: swarm_node_id_cmd
      changed_when: "false"

    - name: Store swarm node id
      ansible.builtin.set_fact:
        swarm_node_id: "{{ swarm_node_id_cmd.stdout | trim }}"

    - name: Flush handlers after WireGuard config install
      ansible.builtin.meta: flush_handlers

- name: Reconcile VPN nodes (manager label/decommission phase)
  hosts: "swarm_managers[0]"
  gather_facts: false
  become: true
  any_errors_fatal: true

  vars_files:
    - ../inventory/generated/vpn_nodes.yml
  vars:
    repo_root: "{{ lookup('env', 'REPO_ROOT') | default(playbook_dir + '/../..', true) }}"
    refresh_registry_auth_effective: >-
      {{
        (
          refresh_registry_auth
          | default(lookup('env', 'REFRESH_REGISTRY_AUTH') | default('false', true))
        ) | bool
      }}

  tasks:
    - name: Initialize joined/missing VPN target lists
      ansible.builtin.set_fact:
        joined_vpn_targets: []
        missing_vpn_targets: []

    - name: Classify VPN targets by swarm_node_id presence
      ansible.builtin.set_fact:
        joined_vpn_targets: >-
          {{
            joined_vpn_targets
            + ([item] if (hostvars[item].swarm_node_id is defined and (hostvars[item].swarm_node_id | string | trim | length) > 0) else [])
          }}
        missing_vpn_targets: >-
          {{
            missing_vpn_targets
            + ([item] if not (hostvars[item].swarm_node_id is defined and (hostvars[item].swarm_node_id | string | trim | length) > 0) else [])
          }}
      loop: "{{ groups['vpn_targets'] | default([]) }}"
      loop_control:
        label: "{{ item }}"

    - name: Ensure all desired VPN targets joined swarm and reported swarm_node_id
      ansible.builtin.assert:
        that:
          - missing_vpn_targets | length == 0
        fail_msg: >-
          VPN targets missing swarm_node_id (likely SSH/bootstrap failure): {{ missing_vpn_targets | join(', ') }}.
          Check SSH host key validation and connectivity from runner.

    - name: Wait until desired nodes are visible in swarm
      ansible.builtin.command:
        argv:
          - docker
          - node
          - inspect
          - "{{ hostvars[item].swarm_node_id }}"
      loop: "{{ joined_vpn_targets }}"
      loop_control:
        label: "{{ item }}"
      register: node_visible
      until: node_visible.rc == 0
      retries: 30
      delay: 1
      changed_when: "false"

    - name: Label desired nodes (role/channel/peer_name)
      ansible.builtin.command:
        argv:
          - bash
          - "{{ repo_root }}/scripts/core/swarm-label-node.sh"
          - --node-id
          - "{{ hostvars[item].swarm_node_id }}"
          - --channel
          - "{{ hostvars[item].node_channel }}"
          - --peer-name
          - "{{ hostvars[item].peer_name }}"
      loop: "{{ joined_vpn_targets }}"
      loop_control:
        label: "{{ item }} -> {{ hostvars[item].swarm_node_id }}"
      register: label_result
      changed_when: "label_result.rc == 10"
      failed_when: label_result.rc not in [0, 10]

    - name: Refresh registry auth on VPN services
      ansible.builtin.command:
        argv:
          - bash
          - "{{ repo_root }}/scripts/core/swarm-refresh-registry-auth.sh"
          - --service
          - "{{ item }}"
      loop:
        - vpn_xray
        - vpn_node-agent
        - vpn-dev_xray
      when: refresh_registry_auth_effective
      register: registry_result
      changed_when: "registry_result.rc == 10"
      failed_when: registry_result.rc not in [0, 10]

    - name: Decommission stale peers from swarm and WireGuard
      ansible.builtin.command:
        argv:
          - bash
          - "{{ repo_root }}/wireguard/manager/decommission-peer.sh"
          - --root
          - "{{ repo_root }}"
          - --name
          - "{{ item }}"
      loop: "{{ hostvars[inventory_hostname].stale_peer_names | default([]) }}"
      loop_control:
        label: "{{ item }}"
      register: decommission_result
      changed_when: "decommission_result.rc == 10"
      failed_when: decommission_result.rc not in [0, 10]

    - name: Show final WireGuard status
      ansible.builtin.command:
        argv: [wg, show, wg0]
      changed_when: "false"
