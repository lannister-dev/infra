---
- name: Reconcile VPN nodes (manager phase)
  hosts: swarm_managers
  gather_facts: false
  become: true

  vars_files:
    - ../inventory/generated/vpn_nodes.yml

  tasks:
    - name: Ensure vpn_nodes variable exists
      ansible.builtin.assert:
        that:
          - vpn_nodes is defined
          - vpn_nodes is iterable
        fail_msg: "Generated inventory file ansible/inventory/generated/vpn_nodes.yml is missing or invalid."

    - name: Ensure WireGuard config exists on manager
      ansible.builtin.stat:
        path: /etc/wireguard/wg0.conf
      register: wg_conf

    - name: Ensure required manager commands are present
      ansible.builtin.command:
        argv:
          - bash
          - -lc
          - "command -v wg >/dev/null 2>&1 && command -v docker >/dev/null 2>&1"
      changed_when: false

    - name: Fail if WireGuard is not initialized on manager
      ansible.builtin.assert:
        that:
          - wg_conf.stat.exists
        fail_msg: "WireGuard manager config /etc/wireguard/wg0.conf is missing. Initialize manager first."

    - name: Build desired enabled node lists
      ansible.builtin.set_fact:
        desired_enabled_nodes: "{{ vpn_nodes | selectattr('enabled', 'equalto', true) | list }}"
        desired_enabled_peer_names: "{{ (vpn_nodes | selectattr('enabled', 'equalto', true) | map(attribute='name') | list) | unique }}"

    - name: Validate desired node schema
      ansible.builtin.assert:
        that:
          - item.name is match('^[a-zA-Z0-9._-]+$')
          - item.public_ip | length > 0
          - item.channel in ['prod', 'dev']
          - (item.ssh_port | int) > 0
        fail_msg: "Invalid node entry: {{ item }}"
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Prevent accidental empty desired node set
      ansible.builtin.assert:
        that:
          - (desired_enabled_peer_names | length) > 0 or allow_empty_vpn_nodes
        fail_msg: "Desired enabled VPN node set is empty. Set ALLOW_EMPTY_VPN_NODES=true only for intentional full decommission."

    - name: List current swarm VPN node ids
      ansible.builtin.command:
        argv:
          - docker
          - node
          - ls
          - --filter
          - label=role=vpn
          - -q
      register: current_vpn_node_ids
      changed_when: false

    - name: Read peer_name label from current swarm VPN nodes
      ansible.builtin.command:
        argv:
          - docker
          - node
          - inspect
          - --format
          - "{{ '{{ index .Spec.Labels \"peer_name\" }}' }}"
          - "{{ item }}"
      loop: "{{ current_vpn_node_ids.stdout_lines }}"
      register: current_peer_name_results
      changed_when: false

    - name: Build current/stale peer lists and unlabeled node list
      ansible.builtin.set_fact:
        unlabeled_vpn_node_ids: >-
          {{
            (
              current_peer_name_results.results
              | selectattr('stdout', 'defined')
              | selectattr('stdout', 'equalto', '<no value>')
              | map(attribute='item')
              | list
            ) | union(
              current_peer_name_results.results
              | selectattr('stdout', 'defined')
              | selectattr('stdout', 'equalto', '')
              | map(attribute='item')
              | list
            )
          }}
        current_peer_names: >-
          {{
            current_peer_name_results.results
            | map(attribute='stdout')
            | map('trim')
            | reject('equalto', '')
            | reject('equalto', '<no value>')
            | unique
            | list
          }}

    - name: Ensure all role=vpn nodes have peer_name label
      ansible.builtin.assert:
        that:
          - unlabeled_vpn_node_ids | length == 0
        fail_msg: "Found role=vpn swarm nodes without peer_name label: {{ unlabeled_vpn_node_ids | join(', ') }}"

    - name: Read WireGuard peer names from manager config
      ansible.builtin.shell: |
        set -Eeuo pipefail
        awk '/^# .* start$/{print $2}' /etc/wireguard/wg0.conf || true
      args:
        executable: /bin/bash
      register: current_wg_peer_names_cmd
      changed_when: false

    - name: Build stale peer list (swarm + WireGuard)
      ansible.builtin.set_fact:
        stale_peer_names: >-
          {{
            (
              current_peer_names
              | union(current_wg_peer_names_cmd.stdout_lines | map('trim') | reject('equalto', '') | list)
              | unique
              | list
            ) | difference(desired_enabled_peer_names)
          }}

    - name: Ensure WireGuard peer and client config exists for desired enabled nodes
      ansible.builtin.shell: |
        set -Eeuo pipefail

        ROOT="{{ repo_root }}"
        NAME="{{ item.name }}"
        source "${ROOT}/wireguard/manager/defaults.env"
        if [ -f "${ROOT}/wireguard/manager/defaults.env.local" ]; then
          source "${ROOT}/wireguard/manager/defaults.env.local"
        fi

        WG_INTERFACE="${WG_INTERFACE:-wg0}"
        WG_ETC_DIR="${WG_ETC_DIR:-/etc/wireguard}"
        WG_CLIENTS_DIR="${WG_CLIENTS_DIR:-/etc/wireguard/clients}"
        WG_CONF="${WG_ETC_DIR}/${WG_INTERFACE}.conf"
        WG_SERVER_PUB="${WG_ETC_DIR}/${WG_INTERFACE}.pub"
        WG_SUBNET="${WG_IPV4_SUBNET:-10.100.0.0/24}"
        WG_ALLOWED="${WG_CLIENT_ALLOWED_IPS:-10.100.0.0/24}"
        WG_KEEPALIVE="${WG_PERSISTENT_KEEPALIVE:-25}"

        [ -n "${WG_ENDPOINT:-}" ] || { echo "WG_ENDPOINT is empty in wireguard defaults" >&2; exit 1; }
        [ -n "${WG_PORT:-}" ] || { echo "WG_PORT is empty in wireguard defaults" >&2; exit 1; }
        [ -f "${WG_SERVER_PUB}" ] || { echo "Missing WireGuard server pubkey: ${WG_SERVER_PUB}" >&2; exit 1; }

        WG_CLIENT_CONF="${WG_CLIENTS_DIR}/${NAME}-${WG_INTERFACE}.conf"
        changed=0

        # Existing peer without client config is inconsistent.
        # Recreate peer block so manager can redistribute a fresh client config.
        if grep -qE "^# ${NAME} start$" "${WG_CONF}"; then
          if [ -f "${WG_CLIENT_CONF}" ]; then
            echo "CHANGED=0"
            exit 0
          fi

          old_pub="$(sed -n "/^# ${NAME} start$/,/^# ${NAME} end$/p" "${WG_CONF}" | awk '/^PublicKey = /{print $3; exit}')"
          if [ -n "${old_pub}" ] && wg show "${WG_INTERFACE}" >/dev/null 2>&1; then
            wg set "${WG_INTERFACE}" peer "${old_pub}" remove || true
          fi

          sed -i "/^# ${NAME} start$/,/^# ${NAME} end$/d" "${WG_CONF}"
          changed=1
        fi

        prefix="$(echo "${WG_SUBNET}" | cut -d/ -f1 | awk -F. '{print $1"."$2"."$3}')"
        used="$(awk '/^AllowedIPs = /{
          split($3,a,","); split(a[1],b,"/"); split(b[1],c,"."); print c[4]
        }' "${WG_CONF}" | sort -n | uniq || true)"

        octet=""
        for n in $(seq 2 254); do
          if ! echo "${used}" | grep -qx "${n}"; then
            octet="${n}"
            break
          fi
        done
        [ -n "${octet}" ] || { echo "No free WireGuard IPv4 in ${WG_SUBNET}" >&2; exit 1; }

        client_ip="${prefix}.${octet}"
        client_priv="$(wg genkey)"
        client_pub="$(printf '%s' "${client_priv}" | wg pubkey)"

        {
          echo "# ${NAME} start"
          echo "[Peer]"
          echo "PublicKey = ${client_pub}"
          echo "AllowedIPs = ${client_ip}/32"
          echo "# ${NAME} end"
          echo
        } >> "${WG_CONF}"

        mkdir -p "${WG_CLIENTS_DIR}"
        chmod 700 "${WG_CLIENTS_DIR}"

        {
          echo "# vpn-infra managed client"
          echo "[Interface]"
          echo "Address = ${client_ip}/32"
          echo "PrivateKey = ${client_priv}"
          if [ -n "${WG_CLIENT_DNS:-}" ]; then
            echo "DNS = ${WG_CLIENT_DNS}"
          fi
          echo
          echo "[Peer]"
          echo "PublicKey = $(cat "${WG_SERVER_PUB}")"
          echo "Endpoint = ${WG_ENDPOINT}:${WG_PORT}"
          echo "AllowedIPs = ${WG_ALLOWED}"
          echo "PersistentKeepalive = ${WG_KEEPALIVE}"
        } > "${WG_CLIENTS_DIR}/${NAME}-${WG_INTERFACE}.conf"
        chmod 600 "${WG_CLIENTS_DIR}/${NAME}-${WG_INTERFACE}.conf"

        if wg show "${WG_INTERFACE}" >/dev/null 2>&1; then
          wg set "${WG_INTERFACE}" peer "${client_pub}" allowed-ips "${client_ip}/32"
          wg syncconf "${WG_INTERFACE}" <(wg-quick strip "${WG_INTERFACE}") || true
        else
          systemctl restart "wg-quick@${WG_INTERFACE}" >/dev/null 2>&1 || true
        fi
        echo "CHANGED=1"
      args:
        executable: /bin/bash
      loop: "{{ desired_enabled_nodes }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Register desired enabled nodes as dynamic inventory targets
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: vpn_targets
        ansible_host: "{{ item.public_ip }}"
        ansible_user: "{{ item.ssh_user }}"
        ansible_port: "{{ item.ssh_port }}"
        peer_name: "{{ item.name }}"
        node_channel: "{{ item.channel }}"
      loop: "{{ desired_enabled_nodes }}"

    - name: Get swarm join token
      ansible.builtin.command:
        argv:
          - docker
          - swarm
          - join-token
          - worker
          - -q
      register: swarm_worker_join_token
      changed_when: false
      no_log: true

    - name: Get swarm manager address
      ansible.builtin.command:
        argv:
          - docker
          - node
          - inspect
          - self
          - --format
          - "{{ '{{.ManagerStatus.Addr}}' }}"
      register: swarm_manager_addr
      changed_when: false

- name: Reconcile VPN nodes (remote host bootstrap/join phase)
  hosts: vpn_targets
  gather_facts: false
  become: true

  tasks:
    - name: Ensure python3 exists for Ansible modules
      ansible.builtin.raw: |
        test -x /usr/bin/python3 || (apt-get update -y && apt-get install -y python3)
      changed_when: false

    - name: Check whether docker CLI is already installed
      ansible.builtin.command:
        argv:
          - bash
          - -lc
          - "command -v docker >/dev/null 2>&1"
      register: docker_cli_present
      changed_when: false
      failed_when: false

    - name: Install Docker package when docker CLI is missing
      ansible.builtin.apt:
        update_cache: true
        update_cache_retries: 5
        update_cache_retry_max_delay: 12
        lock_timeout: 600
        name:
          - docker.io
        state: present
      when: docker_cli_present.rc != 0

    - name: Install WireGuard packages
      ansible.builtin.apt:
        update_cache: true
        update_cache_retries: 5
        update_cache_retry_max_delay: 12
        lock_timeout: 600
        name:
          - wireguard
          - wireguard-tools
        state: present

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Read WireGuard client config from manager
      ansible.builtin.slurp:
        src: "/etc/wireguard/clients/{{ peer_name }}-wg0.conf"
      delegate_to: "{{ groups['swarm_managers'][0] }}"
      register: wg_client_conf_raw

    - name: Install WireGuard config on remote node
      ansible.builtin.copy:
        content: "{{ wg_client_conf_raw.content | b64decode }}"
        dest: /etc/wireguard/wg0.conf
        mode: "0600"

    - name: Ensure WireGuard service is enabled and restarted
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: restarted
        enabled: true

    - name: Check local swarm state
      ansible.builtin.command:
        argv:
          - docker
          - info
          - --format
          - "{{ '{{.Swarm.LocalNodeState}}' }}"
      register: swarm_local_state
      changed_when: false

    - name: Join swarm as worker if not active
      ansible.builtin.command:
        argv:
          - docker
          - swarm
          - join
          - --token
          - "{{ hostvars[groups['swarm_managers'][0]].swarm_worker_join_token.stdout | trim }}"
          - "{{ hostvars[groups['swarm_managers'][0]].swarm_manager_addr.stdout | trim }}"
      when: swarm_local_state.stdout | trim != "active"
      no_log: true

    - name: Read node id after swarm join
      ansible.builtin.command:
        argv:
          - docker
          - info
          - --format
          - "{{ '{{.Swarm.NodeID}}' }}"
      register: swarm_node_id_cmd
      changed_when: false

    - name: Store swarm node id
      ansible.builtin.set_fact:
        swarm_node_id: "{{ swarm_node_id_cmd.stdout | trim }}"

- name: Reconcile VPN nodes (manager label/decommission phase)
  hosts: swarm_managers
  gather_facts: false
  become: true

  vars_files:
    - ../inventory/generated/vpn_nodes.yml

  tasks:
    - name: Wait until desired node ids are visible in swarm
      ansible.builtin.shell: |
        set -Eeuo pipefail
        for _ in $(seq 1 30); do
          docker node inspect "{{ hostvars[item].swarm_node_id }}" >/dev/null 2>&1 && exit 0
          sleep 1
        done
        exit 1
      args:
        executable: /bin/bash
      loop: "{{ groups['vpn_targets'] | default([]) }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false

    - name: Label desired nodes (role/channel/peer_name)
      ansible.builtin.shell: |
        set -Eeuo pipefail
        NODE_ID="{{ hostvars[item].swarm_node_id }}"
        WANT_CHANNEL="{{ hostvars[item].node_channel }}"
        WANT_PEER="{{ hostvars[item].peer_name }}"

        cur_role="$(docker node inspect --format '{{ "{{ index .Spec.Labels \"role\" }}" }}' "${NODE_ID}" 2>/dev/null || true)"
        cur_channel="$(docker node inspect --format '{{ "{{ index .Spec.Labels \"channel\" }}" }}' "${NODE_ID}" 2>/dev/null || true)"
        cur_peer="$(docker node inspect --format '{{ "{{ index .Spec.Labels \"peer_name\" }}" }}' "${NODE_ID}" 2>/dev/null || true)"

        if [ "${cur_role}" = "vpn" ] && [ "${cur_channel}" = "${WANT_CHANNEL}" ] && [ "${cur_peer}" = "${WANT_PEER}" ]; then
          echo "CHANGED=0"
          exit 0
        fi

        docker node update \
          --label-add "role=vpn" \
          --label-add "channel=${WANT_CHANNEL}" \
          --label-add "peer_name=${WANT_PEER}" \
          "${NODE_ID}" >/dev/null
        echo "CHANGED=1"
      args:
        executable: /bin/bash
      loop: "{{ groups['vpn_targets'] | default([]) }}"
      loop_control:
        label: "{{ item }} -> {{ hostvars[item].swarm_node_id }}"
      changed_when: true

    - name: Refresh registry auth on VPN services
      ansible.builtin.shell: |
        set -Eeuo pipefail
        svc="{{ item }}"
        if ! docker service inspect "${svc}" >/dev/null 2>&1; then
          echo "CHANGED=0"
          exit 0
        fi
        docker service update --with-registry-auth --detach "${svc}" >/dev/null
        echo "CHANGED=1"
      args:
        executable: /bin/bash
      loop:
        - vpn_xray
        - vpn_node-agent
        - vpn-dev_xray
      changed_when: false

    - name: Decommission stale peers from swarm and WireGuard
      ansible.builtin.shell: |
        set -Eeuo pipefail
        NAME="{{ item }}"

        while read -r node_id; do
          [ -n "${node_id}" ] || continue
          docker node update --availability drain "${node_id}" >/dev/null 2>&1 || true
          docker node rm --force "${node_id}" >/dev/null 2>&1 || true
        done < <(docker node ls --filter "label=peer_name=${NAME}" -q || true)

        WG_CONF="/etc/wireguard/wg0.conf"
        CLIENT_CONF="/etc/wireguard/clients/${NAME}-wg0.conf"

        if [ -f "${WG_CONF}" ] && grep -qE "^# ${NAME} start$" "${WG_CONF}"; then
          pub="$(sed -n "/^# ${NAME} start$/,/^# ${NAME} end$/p" "${WG_CONF}" | awk '/^PublicKey = /{print $3; exit}')"
          if [ -n "${pub}" ] && wg show wg0 >/dev/null 2>&1; then
            wg set wg0 peer "${pub}" remove || true
          fi
          sed -i "/^# ${NAME} start$/,/^# ${NAME} end$/d" "${WG_CONF}"
          if wg show wg0 >/dev/null 2>&1; then
            wg syncconf wg0 <(wg-quick strip wg0) || true
          fi
        fi

        rm -f "${CLIENT_CONF}" || true
      args:
        executable: /bin/bash
      loop: "{{ hostvars[inventory_hostname].stale_peer_names | default([]) }}"
      loop_control:
        label: "{{ item }}"
      changed_when: true

    - name: Show final WireGuard status
      ansible.builtin.command:
        argv:
          - wg
          - show
          - wg0
      changed_when: false
