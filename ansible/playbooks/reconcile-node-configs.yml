---
# Reconcile VPN node infrastructure config (region, reality_ip) with the control plane.
#
# Runs locally (no SSH needed) — calls PATCH /agent/nodes/by-key/{hostname}
# for each enabled VPN node from the Terraform-generated inventory.
#
# Node key = hostname (AGENT_NODE_KEY = "{{.Node.Hostname}}").
# Retries handle the delay between stack deploy and agent bootstrap.
#
# Required env vars:
#   ADMIN_API_KEY          — admin bearer token for the control plane API
#   CONTROL_PLANE_API_BASE — base URL, e.g. https://api.example.com/api/v1
#                            (falls back to CONTROL_PLANE_URL with /artifacts stripped)

- name: Reconcile VPN node configs with control plane
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../inventory/generated/vpn_nodes.yml

  vars:
    control_plane_api_base: >-
      {{
        lookup('env', 'CONTROL_PLANE_API_BASE')
        | default(
            lookup('env', 'CONTROL_PLANE_URL') | default('', true) | regex_replace('/artifacts$', ''),
            true
          )
      }}
    admin_api_key: "{{ lookup('env', 'ADMIN_API_KEY') | default('', true) }}"

  tasks:
    - name: Validate control plane credentials
      ansible.builtin.assert:
        that:
          - control_plane_api_base | trim | length > 0
          - admin_api_key | trim | length > 0
        fail_msg: >-
          Set CONTROL_PLANE_API_BASE (or CONTROL_PLANE_URL) and ADMIN_API_KEY
          environment variables to enable node config reconciliation.

    - name: Build enabled node list
      ansible.builtin.set_fact:
        enabled_nodes: >-
          {{
            vpn_nodes
            | selectattr('enabled', 'equalto', true)
            | rejectattr('traffic_role', 'equalto', 'whitelist_entry')
            | list
          }}

    - name: Skip reconciliation when no enabled nodes
      ansible.builtin.meta: end_play
      when: enabled_nodes | length == 0

    - name: Update node config via control plane API
      ansible.builtin.uri:
        url: "{{ control_plane_api_base | trim }}/agent/nodes/by-key/{{ item.name }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ admin_api_key }}"
        body_format: json
        body:
          region: "{{ item.platform_region | default(item.region, true) }}"
          reality_ip: "{{ item.public_ip }}"
        status_code: [200, 404]
        timeout: 10
      loop: "{{ enabled_nodes }}"
      loop_control:
        label: "{{ item.name }} → {{ item.platform_region | default(item.region, true) }}, {{ item.public_ip }}"
      register: patch_results
      retries: 20
      delay: 5
      until: patch_results.status == 200
      failed_when: false

    - name: Report reconciliation summary
      ansible.builtin.debug:
        msg: >-
          Node config reconciliation complete.
          Updated: {{ patch_results.results | selectattr('status', 'equalto', 200) | list | length }} / {{ enabled_nodes | length }}.

    - name: Fail if any nodes were not reconciled
      ansible.builtin.assert:
        that:
          - (patch_results.results | selectattr('status', 'equalto', 404) | list | length) == 0
        fail_msg: >-
          Nodes not found in control plane after retries:
          {{ patch_results.results | selectattr('status', 'equalto', 404) | map(attribute='item') | map(attribute='name') | list | join(', ') }}.
          Ensure node-agent has bootstrapped (POST /agent/initial). Whitelist entry nodes are excluded from this reconciliation.
