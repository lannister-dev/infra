---
- name: Deploy Swarm stacks
  hosts: swarm_managers
  gather_facts: false
  become: true

  vars:
    required_networks:
      - traefik_swarm
      - monitoring
      - vpn-net
    required_volumes:
      - traefik_acme
      - prometheus_data
      - grafana_data
      - agent-data
    required_configs:
      - "{{ prometheus_config_name }}"
      - "{{ grafana_ini_config_name }}"
      - "{{ grafana_datasources_config_name }}"
      - "{{ grafana_dashboards_config_name }}"
      - "{{ xray_config_name }}"
      - "{{ vpn_fallback_index_config_name }}"
      - "{{ vpn_fallback_nginx_config_name }}"

  tasks:
    - name: Check required networks
      ansible.builtin.command:
        argv:
          - docker
          - network
          - inspect
          - "{{ item }}"
      loop: "{{ required_networks }}"
      changed_when: "false"

    - name: Check required volumes
      ansible.builtin.command:
        argv:
          - docker
          - volume
          - inspect
          - "{{ item }}"
      loop: "{{ required_volumes }}"
      changed_when: "false"

    - name: Check required docker configs
      ansible.builtin.command:
        argv:
          - docker
          - config
          - inspect
          - "{{ item }}"
      loop: "{{ required_configs }}"
      changed_when: "false"

    - name: Check dev docker config when vpn-dev is enabled
      ansible.builtin.command:
        argv:
          - docker
          - config
          - inspect
          - "{{ xray_config_dev_name }}"
      when: enable_vpn_dev_stack
      changed_when: "false"

    - name: Check required swarm secret bootstrap_token
      ansible.builtin.command:
        argv:
          - docker
          - secret
          - inspect
          - bootstrap_token
      changed_when: "false"

    - name: Check required swarm secret probe_token when probe is enabled
      ansible.builtin.command:
        argv:
          - docker
          - secret
          - inspect
          - probe_token
      when: deploy_probe_stack
      changed_when: "false"

    - name: Validate NATS auth token when nats is enabled
      ansible.builtin.assert:
        that:
          - (nats_auth_token | trim | length) > 0
        fail_msg: "NATS_AUTH_TOKEN env must be set when nats deployment is enabled."
      when: deploy_nats_stack
      changed_when: "false"

    - name: Validate data-dev secrets when data-dev stack is enabled
      ansible.builtin.assert:
        that:
          - (data_dev_postgres_password | trim | length) > 0
          - (data_dev_redis_password | trim | length) > 0
        fail_msg: >-
          DEPLOY_DATA_DEV_STACK=true requires:
          DEV_POSTGRES_PASSWORD and DEV_REDIS_PASSWORD.
      when: deploy_data_dev_stack
      changed_when: "false"

    - name: Validate data-prod secrets when data-prod stack is enabled
      ansible.builtin.assert:
        that:
          - (data_prod_postgres_password | trim | length) > 0
          - (data_prod_redis_password | trim | length) > 0
        fail_msg: >-
          DEPLOY_DATA_PROD_STACK=true requires:
          DATA_PROD_POSTGRES_PASSWORD and DATA_PROD_REDIS_PASSWORD.
      when: deploy_data_prod_stack
      changed_when: "false"

    - name: Check nats_auth_token secret when nats is enabled
      ansible.builtin.command:
        argv:
          - docker
          - secret
          - inspect
          - nats_auth_token
      when: deploy_nats_stack
      register: nats_auth_secret_inspect
      failed_when: false
      changed_when: false

    - name: Create nats_auth_token secret when missing
      ansible.builtin.shell: |
        set -Eeuo pipefail
        printf '%s' "$NATS_AUTH_TOKEN" | docker secret create nats_auth_token -
      args:
        executable: /bin/bash
      environment:
        NATS_AUTH_TOKEN: "{{ nats_auth_token }}"
      when:
        - deploy_nats_stack
        - nats_auth_secret_inspect.rc != 0
      no_log: true
      changed_when: true

    - name: Check data_dev_postgres_password secret when data-dev is enabled
      ansible.builtin.command:
        argv:
          - docker
          - secret
          - inspect
          - data_dev_postgres_password
      when: deploy_data_dev_stack
      register: data_dev_pg_secret_inspect
      failed_when: false
      changed_when: false

    - name: Create data_dev_postgres_password secret when missing
      ansible.builtin.shell: |
        set -Eeuo pipefail
        printf '%s' "$DEV_POSTGRES_PASSWORD" | docker secret create data_dev_postgres_password -
      args:
        executable: /bin/bash
      environment:
        DEV_POSTGRES_PASSWORD: "{{ data_dev_postgres_password }}"
      when:
        - deploy_data_dev_stack
        - data_dev_pg_secret_inspect.rc != 0
      no_log: true
      changed_when: true

    - name: Check data_dev_redis_password secret when data-dev is enabled
      ansible.builtin.command:
        argv:
          - docker
          - secret
          - inspect
          - data_dev_redis_password
      when: deploy_data_dev_stack
      register: data_dev_redis_secret_inspect
      failed_when: false
      changed_when: false

    - name: Create data_dev_redis_password secret when missing
      ansible.builtin.shell: |
        set -Eeuo pipefail
        printf '%s' "$DEV_REDIS_PASSWORD" | docker secret create data_dev_redis_password -
      args:
        executable: /bin/bash
      environment:
        DEV_REDIS_PASSWORD: "{{ data_dev_redis_password }}"
      when:
        - deploy_data_dev_stack
        - data_dev_redis_secret_inspect.rc != 0
      no_log: true
      changed_when: true

    - name: Check data_prod_postgres_password secret when data-prod is enabled
      ansible.builtin.command:
        argv:
          - docker
          - secret
          - inspect
          - data_prod_postgres_password
      when: deploy_data_prod_stack
      register: data_prod_pg_secret_inspect
      failed_when: false
      changed_when: false

    - name: Create data_prod_postgres_password secret when missing
      ansible.builtin.shell: |
        set -Eeuo pipefail
        printf '%s' "$DATA_PROD_POSTGRES_PASSWORD" | docker secret create data_prod_postgres_password -
      args:
        executable: /bin/bash
      environment:
        DATA_PROD_POSTGRES_PASSWORD: "{{ data_prod_postgres_password }}"
      when:
        - deploy_data_prod_stack
        - data_prod_pg_secret_inspect.rc != 0
      no_log: true
      changed_when: true

    - name: Check data_prod_redis_password secret when data-prod is enabled
      ansible.builtin.command:
        argv:
          - docker
          - secret
          - inspect
          - data_prod_redis_password
      when: deploy_data_prod_stack
      register: data_prod_redis_secret_inspect
      failed_when: false
      changed_when: false

    - name: Create data_prod_redis_password secret when missing
      ansible.builtin.shell: |
        set -Eeuo pipefail
        printf '%s' "$DATA_PROD_REDIS_PASSWORD" | docker secret create data_prod_redis_password -
      args:
        executable: /bin/bash
      environment:
        DATA_PROD_REDIS_PASSWORD: "{{ data_prod_redis_password }}"
      when:
        - deploy_data_prod_stack
        - data_prod_redis_secret_inspect.rc != 0
      no_log: true
      changed_when: true

    - name: Validate external data services precheck settings
      ansible.builtin.assert:
        that:
          - external_postgres_host | trim | length > 0
          - external_redis_host | trim | length > 0
          - (external_postgres_port | int) > 0
          - (external_redis_port | int) > 0
        fail_msg: >-
          EXTERNAL_DATA_PRECHECK_ENABLED=true requires:
          EXTERNAL_POSTGRES_HOST, EXTERNAL_POSTGRES_PORT,
          EXTERNAL_REDIS_HOST, EXTERNAL_REDIS_PORT.
      when: external_data_precheck_enabled

    - name: Check external Postgres TCP reachability
      ansible.builtin.wait_for:
        host: "{{ external_postgres_host }}"
        port: "{{ external_postgres_port | int }}"
        state: started
        timeout: "{{ external_data_precheck_timeout | int }}"
      when: external_data_precheck_enabled
      changed_when: "false"

    - name: Check external Redis TCP reachability
      ansible.builtin.wait_for:
        host: "{{ external_redis_host }}"
        port: "{{ external_redis_port | int }}"
        state: started
        timeout: "{{ external_data_precheck_timeout | int }}"
      when: external_data_precheck_enabled
      changed_when: "false"

    - name: Deploy traefik stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - -c
          - docker/stacks/traefik.yml
          - traefik
      args:
        chdir: "{{ repo_root }}"
      environment:
        TRAEFIK_IMAGE_TAG: "{{ traefik_image_tag }}"
        CF_DNS_API_TOKEN: "{{ cf_dns_api_token }}"
      no_log: true
      changed_when: "false"

    - name: Deploy monitoring stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - -c
          - docker/stacks/monitoring.yml
          - monitoring
      args:
        chdir: "{{ repo_root }}"
      environment:
        PROMETHEUS_CONFIG_NAME: "{{ prometheus_config_name }}"
        GRAFANA_INI_CONFIG_NAME: "{{ grafana_ini_config_name }}"
        GRAFANA_DATASOURCES_CONFIG_NAME: "{{ grafana_datasources_config_name }}"
        GRAFANA_DASHBOARDS_CONFIG_NAME: "{{ grafana_dashboards_config_name }}"
        PROMETHEUS_IMAGE_TAG: "{{ prometheus_image_tag }}"
        GRAFANA_IMAGE_TAG: "{{ grafana_image_tag }}"
        GF_SECURITY_ADMIN_USER: "{{ gf_security_admin_user }}"
        GF_SECURITY_ADMIN_PASSWORD: "{{ gf_security_admin_password }}"
        GF_USERS_ALLOW_SIGN_UP: "{{ gf_users_allow_sign_up }}"
      no_log: true
      changed_when: "false"

    - name: Deploy swarmpit stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - -c
          - docker/stacks/swarmpit.yml
          - swarmpit
      args:
        chdir: "{{ repo_root }}"
      environment:
        SWARMPIT_IMAGE_TAG: "{{ swarmpit_image_tag }}"
        SWARMPIT_AGENT_IMAGE_TAG: "{{ swarmpit_agent_image_tag }}"
      changed_when: "false"

    - name: Deploy nats stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - --prune
          - -c
          - docker/stacks/nats.yml
          - nats
      args:
        chdir: "{{ repo_root }}"
      environment:
        NATS_IMAGE_TAG: "{{ nats_image_tag }}"
        NATS_EXPORTER_IMAGE_TAG: "{{ nats_exporter_image_tag }}"
      when: deploy_nats_stack
      changed_when: "false"

    - name: Deploy data-dev stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - --prune
          - -c
          - docker/stacks/data-dev.yml
          - data-dev
      args:
        chdir: "{{ repo_root }}"
      environment:
        POSTGRES_IMAGE_TAG: "{{ postgres_image_tag }}"
        REDIS_IMAGE_TAG: "{{ redis_image_tag }}"
        POSTGRES_DB_NAME: "{{ data_dev_postgres_db }}"
        POSTGRES_DB_USER: "{{ data_dev_postgres_user }}"
      when: deploy_data_dev_stack
      changed_when: "false"

    - name: Deploy data-prod stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - --prune
          - -c
          - docker/stacks/data-prod.yml
          - data-prod
      args:
        chdir: "{{ repo_root }}"
      environment:
        POSTGRES_IMAGE_TAG: "{{ postgres_image_tag }}"
        REDIS_IMAGE_TAG: "{{ redis_image_tag }}"
        POSTGRES_DB_NAME: "{{ data_prod_postgres_db }}"
        POSTGRES_DB_USER: "{{ data_prod_postgres_user }}"
      when: deploy_data_prod_stack
      changed_when: "false"

    - name: Deploy vpn stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - --resolve-image=always
          - --prune
          - -c
          - docker/stacks/vpn-xray.yml
          - vpn
      args:
        chdir: "{{ repo_root }}"
      environment:
        XRAY_CONFIG_NAME: "{{ xray_config_name }}"
        VPN_FALLBACK_INDEX_CONFIG_NAME: "{{ vpn_fallback_index_config_name }}"
        VPN_FALLBACK_NGINX_CONFIG_NAME: "{{ vpn_fallback_nginx_config_name }}"
        VPN_DOMAIN: "{{ vpn_domain }}"
        VPN_WS_PATH: "{{ vpn_ws_path }}"
        VPN_XHTTP_PATH: "{{ vpn_xhttp_path }}"
        VPN_FALLBACK_DOMAIN: "{{ vpn_fallback_domain }}"
        XRAY_IMAGE_TAG: "{{ xray_image_tag }}"
        NGINX_ALPINE_IMAGE_TAG: "{{ nginx_alpine_image_tag }}"
        NODE_AGENT_IMAGE_REF: "{{ node_agent_image_ref }}"
      changed_when: "false"

    - name: Deploy vpn-dev stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - --prune
          - -c
          - docker/stacks/vpn-xray-dev.yml
          - vpn-dev
      args:
        chdir: "{{ repo_root }}"
      environment:
        XRAY_CONFIG_DEV_NAME: "{{ xray_config_dev_name }}"
        VPN_DEV_DOMAIN: "{{ vpn_dev_domain }}"
        VPN_DEV_WS_PATH: "{{ vpn_dev_ws_path }}"
        VPN_DEV_XHTTP_PATH: "{{ vpn_dev_xhttp_path }}"
        XRAY_IMAGE_TAG: "{{ xray_image_tag }}"
        NODE_AGENT_IMAGE_REF_DEV: "{{ node_agent_image_ref_dev }}"
      when: enable_vpn_dev_stack
      changed_when: "false"

    - name: Deploy probe stack
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - --prune
          - -c
          - docker/stacks/probe.yml
          - probe
      args:
        chdir: "{{ repo_root }}"
      when: deploy_probe_stack
      changed_when: "false"

    - name: Wait for Traefik service to have at least one running task
      ansible.builtin.command:
        argv:
          - docker
          - service
          - ps
          - traefik_traefik
          - --filter
          - desired-state=running
          - --format
          - "{{ '{{.CurrentState}}' }}"
      register: traefik_ps
      retries: 30
      delay: 3
      until: >-
        (traefik_ps.stdout_lines | select('match', '^Running') | list | length) > 0
      when: run_sanity_check
      changed_when: "false"

    - name: Wait for Traefik HTTPS listener on localhost
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: 443
        state: started
        timeout: 180
        delay: 2
        sleep: 3
      when: run_sanity_check
      changed_when: "false"

    - name: Ensure sanity check script is executable
      ansible.builtin.file:
        path: "{{ repo_root }}/scripts/core/sanity-check.sh"
        mode: "0755"
      when: run_sanity_check

    - name: Execute sanity check
      ansible.builtin.command:
        argv:
          - ./scripts/core/sanity-check.sh
      args:
        chdir: "{{ repo_root }}"
      environment:
        INFRA_ROLE: manager
      when: run_sanity_check
      changed_when: "false"
