---
- name: Deploy Swarm stacks
  hosts: swarm_managers
  gather_facts: false
  become: false
  vars_files:
    - ../inventory/generated/vpn_nodes.yml

  vars:
    required_networks:
      - traefik_swarm
      - monitoring
      - vpn-net
    required_volumes:
      - traefik_acme
      - prometheus_data
      - grafana_data
      - alertmanager_data
    required_configs:
      - "{{ prometheus_config_name }}"
      - "{{ grafana_ini_config_name }}"
      - "{{ grafana_datasources_config_name }}"
      - "{{ grafana_dashboards_config_name }}"
      - "{{ xray_config_name }}"
      - "{{ vpn_fallback_index_config_name }}"
      - "{{ vpn_fallback_nginx_config_name }}"
      - "{{ alertmanager_config_name }}"
      - "{{ prometheus_alert_rules_config_name }}"

  tasks:
    # ---- prerequisites ----
    - name: Prerequisites
      tags: [prerequisites]
      block:
        - name: Build enabled whitelist entry node list
          ansible.builtin.set_fact:
            enabled_whitelist_entry_nodes: >-
              {{
                vpn_nodes
                | default([])
                | selectattr('enabled', 'equalto', true)
                | selectattr('traffic_role', 'equalto', 'whitelist_entry')
                | list
              }}

        - name: Check required infrastructure resources
          ansible.builtin.include_role:
            name: docker-prerequisites

        - name: Check vault docker config
          ansible.builtin.command:
            argv:
              - docker
              - config
              - inspect
              - "{{ vault_config_name }}"
          register: vault_config_inspect
          failed_when: false
          changed_when: "false"

        - name: Create vault docker config when missing
          ansible.builtin.command:
            argv:
              - docker
              - config
              - create
              - "{{ vault_config_name }}"
              - vault/config.hcl
          args:
            chdir: "{{ repo_root }}"
          when: vault_config_inspect.rc != 0
          changed_when: "true"

        - name: Check dev docker config when vpn-dev is enabled
          ansible.builtin.command:
            argv:
              - docker
              - config
              - inspect
              - "{{ xray_config_dev_name }}"
          when: enable_vpn_dev_stack
          changed_when: "false"

        - name: Validate Traefik edge settings
          ansible.builtin.assert:
            that:
              - (cf_dns_api_token | trim | length) > 0
              - (traefik_acme_email | trim | length) > 0
              - (traefik_dashboard_host | trim | length) > 0
              - (traefik_dashboard_auth_users | trim | length) > 0
            fail_msg: >-
              Traefik deployment requires:
              CF_DNS_API_TOKEN, TRAEFIK_ACME_EMAIL,
              TRAEFIK_DASHBOARD_HOST, TRAEFIK_DASHBOARD_AUTH_USERS.
          changed_when: "false"

        - name: Validate monitoring edge settings
          ansible.builtin.assert:
            that:
              - (prometheus_host | trim | length) > 0
              - (prometheus_auth_users | trim | length) > 0
              - (grafana_host | trim | length) > 0
              - (gf_security_admin_password | trim | length) > 0
            fail_msg: >-
              Monitoring deployment requires:
              PROMETHEUS_HOST, PROMETHEUS_AUTH_USERS,
              GRAFANA_HOST, GF_SECURITY_ADMIN_PASSWORD.
          changed_when: "false"

        - name: Validate Harbor upstream settings
          ansible.builtin.assert:
            that:
              - (harbor_host | trim | length) > 0
              - (harbor_upstream_host | trim | length) > 0
              - (harbor_upstream_port | int) > 0
            fail_msg: >-
              Harbor routing requires:
              HARBOR_HOST, HARBOR_UPSTREAM_HOST, HARBOR_UPSTREAM_PORT.
          changed_when: false

        - name: Check Harbor upstream reachability
          ansible.builtin.wait_for:
            host: "{{ harbor_upstream_host }}"
            port: "{{ harbor_upstream_port | int }}"
            state: started
            timeout: 10
          changed_when: false
          when: harbor_upstream_healthcheck_enabled

        - name: Render Harbor Traefik dynamic config
          ansible.builtin.template:
            src: "{{ repo_root }}/docker/traefik/dynamic/harbor.yml.j2"
            dest: "{{ repo_root }}/docker/traefik/dynamic/harbor.yml"
            mode: "0644"
          changed_when: false

        - name: Check whether live host path exists for Harbor config mirror
          ansible.builtin.stat:
            path: /opt/vpn-infra/docker/traefik/dynamic
          register: harbor_live_dir_stat
          when: repo_root != '/opt/vpn-infra'

        - name: Mirror Harbor Traefik dynamic config into active host path
          ansible.builtin.copy:
            remote_src: true
            src: "{{ repo_root }}/docker/traefik/dynamic/harbor.yml"
            dest: "/opt/vpn-infra/docker/traefik/dynamic/harbor.yml"
            mode: "0644"
          when:
            - repo_root != '/opt/vpn-infra'
            - harbor_live_dir_stat.stat.exists | default(false)
          changed_when: false

        - name: Validate data-dev secrets when data-dev stack is enabled
          ansible.builtin.assert:
            that:
              - (data_dev_postgres_password | trim | length) > 0
              - (data_dev_redis_password | trim | length) > 0
            fail_msg: >-
              DEPLOY_DATA_DEV_STACK=true requires:
              DEV_POSTGRES_PASSWORD and DEV_REDIS_PASSWORD.
          when: deploy_data_dev_stack
          changed_when: "false"

        - name: Validate data-prod secrets when data-prod stack is enabled
          ansible.builtin.assert:
            that:
              - (data_prod_postgres_password | trim | length) > 0
              - (data_prod_redis_password | trim | length) > 0
            fail_msg: >-
              DEPLOY_DATA_PROD_STACK=true requires:
              PROD_POSTGRES_PASSWORD and PROD_REDIS_PASSWORD.
          when: deploy_data_prod_stack
          changed_when: "false"

        - name: Validate whitelist entry relay settings when whitelist nodes are enabled
          ansible.builtin.assert:
            that:
              - (vpn_whitelist_entry_upstream_host | trim | length) > 0
              - (vpn_whitelist_entry_upstream_port | int) > 0
            fail_msg: >-
              Enabled whitelist entry nodes require:
              VPN_WHITELIST_ENTRY_UPSTREAM_HOST and VPN_WHITELIST_ENTRY_UPSTREAM_PORT.
          when: (enabled_whitelist_entry_nodes | default([]) | length) > 0
          changed_when: "false"

        - name: Validate external data services precheck settings
          ansible.builtin.assert:
            that:
              - external_postgres_host | trim | length > 0
              - external_redis_host | trim | length > 0
              - (external_postgres_port | int) > 0
              - (external_redis_port | int) > 0
            fail_msg: >-
              EXTERNAL_DATA_PRECHECK_ENABLED=true requires:
              EXTERNAL_POSTGRES_HOST, EXTERNAL_POSTGRES_PORT,
              EXTERNAL_REDIS_HOST, EXTERNAL_REDIS_PORT.
          when: external_data_precheck_enabled

        - name: Check external Postgres TCP reachability
          ansible.builtin.wait_for:
            host: "{{ external_postgres_host }}"
            port: "{{ external_postgres_port | int }}"
            state: started
            timeout: "{{ external_data_precheck_timeout | int }}"
          when: external_data_precheck_enabled
          changed_when: "false"

        - name: Check external Redis TCP reachability
          ansible.builtin.wait_for:
            host: "{{ external_redis_host }}"
            port: "{{ external_redis_port | int }}"
            state: started
            timeout: "{{ external_data_precheck_timeout | int }}"
          when: external_data_precheck_enabled
          changed_when: "false"

    # ---- secrets ----
    - name: Secrets
      tags: [secrets]
      block:
        - name: Check required swarm secret bootstrap_token
          ansible.builtin.command:
            argv:
              - docker
              - secret
              - inspect
              - bootstrap_token
          changed_when: "false"

        - name: Validate NATS auth token when nats is enabled
          ansible.builtin.assert:
            that:
              - (nats_auth_token | trim | length) > 0
              - (nats_monitor_host | trim | length) > 0
              - (nats_monitor_auth_users | trim | length) > 0
            fail_msg: "NATS_AUTH_TOKEN env must be set when nats deployment is enabled."
          when: deploy_nats_stack
          changed_when: "false"

        - name: Compute whitelist entry relay config checksum
          ansible.builtin.stat:
            path: "{{ repo_root }}/vpn/haproxy/whitelist-entry.cfg.template"
            checksum_algorithm: sha256
          register: whitelist_entry_relay_template_stat
          when: (enabled_whitelist_entry_nodes | default([]) | length) > 0
          changed_when: false

        - name: Resolve whitelist entry relay docker config name
          ansible.builtin.set_fact:
            whitelist_entry_relay_config_name: >-
              vpn_whitelist_entry_relay_config__{{ whitelist_entry_relay_template_stat.stat.checksum[:12] }}
          when: (enabled_whitelist_entry_nodes | default([]) | length) > 0

        - name: Check whitelist entry relay docker config
          ansible.builtin.command:
            argv:
              - docker
              - config
              - inspect
              - "{{ whitelist_entry_relay_config_name }}"
          register: whitelist_entry_relay_config_inspect
          failed_when: false
          when: (enabled_whitelist_entry_nodes | default([]) | length) > 0
          changed_when: false

        - name: Create whitelist entry relay docker config when missing
          ansible.builtin.command:
            argv:
              - docker
              - config
              - create
              - "{{ whitelist_entry_relay_config_name }}"
              - vpn/haproxy/whitelist-entry.cfg.template
          args:
            chdir: "{{ repo_root }}"
          when:
            - (enabled_whitelist_entry_nodes | default([]) | length) > 0
            - whitelist_entry_relay_config_inspect.rc != 0
          changed_when: true

        - name: Manage conditional swarm secrets
          ansible.builtin.include_role:
            name: docker-secrets
          vars:
            docker_secrets:
              - name: nats_auth_token
                value: "{{ nats_auth_token }}"
                condition: "{{ deploy_nats_stack }}"
              - name: data_dev_postgres_password
                value: "{{ data_dev_postgres_password }}"
                condition: "{{ deploy_data_dev_stack }}"
              - name: data_dev_redis_password
                value: "{{ data_dev_redis_password }}"
                condition: "{{ deploy_data_dev_stack }}"
              - name: data_prod_postgres_password
                value: "{{ data_prod_postgres_password }}"
                condition: "{{ deploy_data_prod_stack }}"
              - name: data_prod_redis_password
                value: "{{ data_prod_redis_password }}"
                condition: "{{ deploy_data_prod_stack }}"

    # ---- networks ----
    - name: Networks
      tags: [networks]
      block:
        - name: Manage overlay networks
          ansible.builtin.include_role:
            name: docker-networks
          vars:
            overlay_networks:
              - name: "{{ vpn_dev_network_name }}"
                condition: "{{ enable_vpn_dev_stack or deploy_nats_stack }}"
              - name: "{{ data_dev_network_name }}"
                condition: "{{ deploy_data_dev_stack }}"
              - name: "{{ data_prod_network_name }}"
                condition: "{{ deploy_data_prod_stack }}"

    # ---- traefik ----
    - name: Deploy traefik stack
      tags: [traefik]
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - -c
          - docker/stacks/traefik.yml
          - traefik
      args:
        chdir: "{{ repo_root }}"
      environment:
        TRAEFIK_IMAGE_TAG: "{{ traefik_image_tag }}"
        CF_DNS_API_TOKEN: "{{ cf_dns_api_token }}"
        TRAEFIK_ACME_EMAIL: "{{ traefik_acme_email }}"
        TRAEFIK_DASHBOARD_HOST: "{{ traefik_dashboard_host }}"
        TRAEFIK_DASHBOARD_AUTH_USERS: "{{ traefik_dashboard_auth_users }}"
        TRAEFIK_WEB_FORWARDED_HEADERS_INSECURE: "{{ traefik_web_forwarded_headers_insecure }}"
        TRAEFIK_WEBSECURE_FORWARDED_HEADERS_INSECURE: "{{ traefik_websecure_forwarded_headers_insecure }}"
      no_log: true
      changed_when: "false"

    # ---- monitoring ----
    - name: Deploy monitoring stack
      tags: [monitoring]
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - -c
          - docker/stacks/monitoring.yml
          - monitoring
      args:
        chdir: "{{ repo_root }}"
      environment:
        PROMETHEUS_CONFIG_NAME: "{{ prometheus_config_name }}"
        PROMETHEUS_ALERT_RULES_CONFIG_NAME: "{{ prometheus_alert_rules_config_name }}"
        ALERTMANAGER_CONFIG_NAME: "{{ alertmanager_config_name }}"
        ALERTMANAGER_IMAGE_TAG: "{{ alertmanager_image_tag }}"
        ALERTMANAGER_HOST: "{{ alertmanager_host }}"
        ALERTMANAGER_AUTH_USERS: "{{ alertmanager_auth_users }}"
        ALERTMANAGER_TRAEFIK_ENABLE: "{{ 'true' if (alertmanager_host | trim | length) > 0 else 'false' }}"
        GRAFANA_INI_CONFIG_NAME: "{{ grafana_ini_config_name }}"
        GRAFANA_DATASOURCES_CONFIG_NAME: "{{ grafana_datasources_config_name }}"
        GRAFANA_DASHBOARDS_CONFIG_NAME: "{{ grafana_dashboards_config_name }}"
        PROMETHEUS_IMAGE_TAG: "{{ prometheus_image_tag }}"
        GRAFANA_IMAGE_TAG: "{{ grafana_image_tag }}"
        GF_SECURITY_ADMIN_USER: "{{ gf_security_admin_user }}"
        GF_SECURITY_ADMIN_PASSWORD: "{{ gf_security_admin_password }}"
        GF_USERS_ALLOW_SIGN_UP: "{{ gf_users_allow_sign_up }}"
        PROMETHEUS_HOST: "{{ prometheus_host }}"
        PROMETHEUS_AUTH_USERS: "{{ prometheus_auth_users }}"
        GRAFANA_HOST: "{{ grafana_host }}"
      no_log: true
      changed_when: "false"

    # ---- vault ----
    - name: Deploy vault stack
      tags: [vault]
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - --prune
          - -c
          - docker/stacks/vault.yml
          - vault
      args:
        chdir: "{{ repo_root }}"
      environment:
        VAULT_IMAGE_TAG: "{{ vault_image_tag }}"
        VAULT_CONFIG_NAME: "{{ vault_config_name }}"
      changed_when: "false"

    # ---- swarmpit ----
    - name: Deploy swarmpit stack
      tags: [swarmpit]
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - -c
          - docker/stacks/swarmpit.yml
          - swarmpit
      args:
        chdir: "{{ repo_root }}"
      environment:
        SWARMPIT_IMAGE_TAG: "{{ swarmpit_image_tag }}"
        SWARMPIT_AGENT_IMAGE_TAG: "{{ swarmpit_agent_image_tag }}"
      changed_when: "false"

    # ---- nats ----
    - name: Deploy nats stack
      tags: [nats]
      ansible.builtin.command:
        argv:
          - docker
          - stack
          - deploy
          - --with-registry-auth
          - --prune
          - -c
          - docker/stacks/nats.yml
          - nats
      args:
        chdir: "{{ repo_root }}"
      environment:
        NATS_IMAGE_TAG: "{{ nats_image_tag }}"
        NATS_EXPORTER_IMAGE_TAG: "{{ nats_exporter_image_tag }}"
        NATS_MONITOR_HOST: "{{ nats_monitor_host }}"
        NATS_MONITOR_AUTH_USERS: "{{ nats_monitor_auth_users }}"
        VPN_DEV_NETWORK_NAME: "{{ vpn_dev_network_name }}"
      when: deploy_nats_stack
      no_log: true
      changed_when: "false"

    # ---- data ----
    - name: Data stacks
      tags: [data]
      block:
        - name: Deploy data-dev stack
          ansible.builtin.command:
            argv:
              - docker
              - stack
              - deploy
              - --with-registry-auth
              - --prune
              - -c
              - docker/stacks/data-dev.yml
              - data-dev
          args:
            chdir: "{{ repo_root }}"
          environment:
            POSTGRES_IMAGE_TAG: "{{ postgres_image_tag }}"
            REDIS_IMAGE_TAG: "{{ redis_image_tag }}"
            POSTGRES_DB_NAME: "{{ data_dev_postgres_db }}"
            POSTGRES_DB_USER: "{{ data_dev_postgres_user }}"
            POSTGRES_PUBLISHED_PORT: "{{ data_dev_postgres_published_port | string }}"
            DATA_DEV_NETWORK_NAME: "{{ data_dev_network_name }}"
          when: deploy_data_dev_stack
          changed_when: "false"

        - name: Deploy data-prod stack
          ansible.builtin.command:
            argv:
              - docker
              - stack
              - deploy
              - --with-registry-auth
              - --prune
              - -c
              - docker/stacks/data-prod.yml
              - data-prod
          args:
            chdir: "{{ repo_root }}"
          environment:
            POSTGRES_IMAGE_TAG: "{{ postgres_image_tag }}"
            REDIS_IMAGE_TAG: "{{ redis_image_tag }}"
            POSTGRES_DB_NAME: "{{ data_prod_postgres_db }}"
            POSTGRES_DB_USER: "{{ data_prod_postgres_user }}"
            POSTGRES_PUBLISHED_PORT: "{{ data_prod_postgres_published_port | string }}"
            DATA_PROD_NETWORK_NAME: "{{ data_prod_network_name }}"
            DATA_PROD_PLACEMENT_CONSTRAINT: "{{ data_prod_placement_constraint }}"
          when: deploy_data_prod_stack
          changed_when: "false"

    # ---- vpn ----
    - name: VPN stacks
      tags: [vpn]
      block:
        - name: Deploy vpn stack
          ansible.builtin.command:
            argv:
              - docker
              - stack
              - deploy
              - --with-registry-auth
              - --resolve-image=always
              - --prune
              - -c
              - docker/stacks/vpn-xray.yml
              - vpn
          args:
            chdir: "{{ repo_root }}"
          environment:
            XRAY_CONFIG_NAME: "{{ xray_config_name }}"
            VPN_FALLBACK_INDEX_CONFIG_NAME: "{{ vpn_fallback_index_config_name }}"
            VPN_FALLBACK_NGINX_CONFIG_NAME: "{{ vpn_fallback_nginx_config_name }}"
            VPN_DOMAIN: "{{ vpn_domain }}"
            VPN_WS_PATH: "{{ vpn_ws_path }}"
            VPN_XHTTP_PATH: "{{ vpn_xhttp_path }}"
            VPN_FALLBACK_DOMAIN: "{{ vpn_fallback_domain }}"
            XRAY_IMAGE_TAG: "{{ xray_image_tag }}"
            NGINX_ALPINE_IMAGE_TAG: "{{ nginx_alpine_image_tag }}"
            NODE_AGENT_IMAGE_REF: "{{ node_agent_image_ref }}"
          changed_when: "false"

        - name: Deploy vpn whitelist entry stack
          ansible.builtin.command:
            argv:
              - docker
              - stack
              - deploy
              - --with-registry-auth
              - --resolve-image=always
              - --prune
              - -c
              - docker/stacks/vpn-whitelist-entry.yml
              - vpn-whitelist-entry
          args:
            chdir: "{{ repo_root }}"
          environment:
            HAPROXY_ALPINE_IMAGE_TAG: "{{ haproxy_alpine_image_tag }}"
            VPN_WHITELIST_ENTRY_RELAY_CONFIG_NAME: "{{ whitelist_entry_relay_config_name }}"
            VPN_WHITELIST_ENTRY_UPSTREAM_HOST: "{{ vpn_whitelist_entry_upstream_host }}"
            VPN_WHITELIST_ENTRY_UPSTREAM_PORT: "{{ vpn_whitelist_entry_upstream_port | string }}"
          when: (enabled_whitelist_entry_nodes | default([]) | length) > 0
          changed_when: "false"

        - name: Verify vpn-whitelist-entry_relay service references fresh docker config
          ansible.builtin.command:
            argv:
              - docker
              - service
              - inspect
              - vpn-whitelist-entry_relay
              - --format
              - "{{ '{{json .Spec.TaskTemplate.ContainerSpec.Configs}}' }}"
          register: whitelist_entry_service_configs
          when: (enabled_whitelist_entry_nodes | default([]) | length) > 0
          changed_when: false
          retries: 10
          delay: 6
          until: whitelist_entry_relay_config_name in whitelist_entry_service_configs.stdout

        - name: Assert vpn-whitelist-entry_relay uses expected docker config name
          ansible.builtin.assert:
            that:
              - whitelist_entry_relay_config_name in whitelist_entry_service_configs.stdout
            fail_msg: >-
              vpn-whitelist-entry_relay is not using expected docker config {{ whitelist_entry_relay_config_name }}.
              Current service config payload: {{ whitelist_entry_service_configs.stdout }}
          when: (enabled_whitelist_entry_nodes | default([]) | length) > 0
          changed_when: false

        - name: Check whitelist entry stack presence when no whitelist nodes are enabled
          ansible.builtin.command:
            argv:
              - docker
              - stack
              - services
              - vpn-whitelist-entry
          register: whitelist_entry_stack_inspect
          failed_when: false
          changed_when: false
          when: (enabled_whitelist_entry_nodes | default([]) | length) == 0

        - name: Remove whitelist entry stack when no whitelist nodes are enabled
          ansible.builtin.command:
            argv:
              - docker
              - stack
              - rm
              - vpn-whitelist-entry
          when:
            - (enabled_whitelist_entry_nodes | default([]) | length) == 0
            - whitelist_entry_stack_inspect.rc == 0
          changed_when: true

        - name: Deploy vpn-dev stack
          ansible.builtin.command:
            argv:
              - docker
              - stack
              - deploy
              - --with-registry-auth
              - --prune
              - -c
              - docker/stacks/vpn-xray-dev.yml
              - vpn-dev
          args:
            chdir: "{{ repo_root }}"
          environment:
            XRAY_CONFIG_DEV_NAME: "{{ xray_config_dev_name }}"
            VPN_DEV_DOMAIN: "{{ vpn_dev_domain }}"
            VPN_DEV_WS_PATH: "{{ vpn_dev_ws_path }}"
            VPN_DEV_XHTTP_PATH: "{{ vpn_dev_xhttp_path }}"
            XRAY_IMAGE_TAG: "{{ xray_image_tag }}"
            NODE_AGENT_IMAGE_REF_DEV: "{{ node_agent_image_ref_dev }}"
          when: enable_vpn_dev_stack
          changed_when: "false"

    # ---- sanity-check ----
    - name: Sanity check
      tags: [sanity-check]
      block:
        - name: Wait for Traefik service to have at least one running task
          ansible.builtin.command:
            argv:
              - docker
              - service
              - ps
              - traefik_traefik
              - --filter
              - desired-state=running
              - --format
              - "{{ '{{.CurrentState}}' }}"
          register: traefik_ps
          retries: 30
          delay: 3
          until: >-
            (traefik_ps.stdout_lines | select('match', '^Running') | list | length) > 0
          when: run_sanity_check
          changed_when: "false"

        - name: Wait for Traefik HTTPS listener on localhost
          ansible.builtin.wait_for:
            host: "127.0.0.1"
            port: 443
            state: started
            timeout: 180
            delay: 2
            sleep: 3
          when: run_sanity_check
          changed_when: "false"

        - name: Ensure sanity check script is executable
          ansible.builtin.file:
            path: "{{ repo_root }}/scripts/core/sanity-check.sh"
            mode: "0755"
          when: run_sanity_check

        - name: Execute sanity check
          ansible.builtin.command:
            argv:
              - ./scripts/core/sanity-check.sh
          args:
            chdir: "{{ repo_root }}"
          environment:
            INFRA_ROLE: manager
          when: run_sanity_check
          changed_when: "false"
