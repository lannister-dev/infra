http:
  routers:
    harbor-http:
      rule: "Host(`registry.lannister.webtm.ru`)"
      entryPoints:
        - web
      service: harbor

    harbor-https:
      rule: "Host(`registry.lannister.webtm.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: harbor

  services:
    harbor:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"