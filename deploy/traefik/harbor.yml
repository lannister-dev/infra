http:
  routers:
    harbor-http:
      rule: "Host(`registry.lannister.webtm.ru`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: harbor

    harbor-https:
      rule: "Host(`registry.lannister.webtm.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: harbor

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    harbor:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"