http:
  routers:
    harbor:
      rule: "Host(`registry.lannister-dev.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
        domains:
          - main: registry.lannister-dev.ru
      service: harbor

  services:
    harbor:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"