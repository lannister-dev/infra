[log]
  level = "DEBUG"

[accessLog]
  format = "json"


[entryPoints]
  [entryPoints.http]
    address = ":80"
  [entryPoints.https]
    address = ":443"

[entryPoints.http.http.redirections.entryPoint]
  to = "https"
  scheme = "https"
  permanent = true

[api]
  dashboard = true
  insecure = true

[providers.docker]
  exposedByDefault = false
  network = "traefik_proxy"

[certificatesResolvers.letsEncrypt.acme]
  storage = "/ssl/acme.json"
  [certificatesResolvers.letsEncrypt.acme.dnsChallenge]
    provider = "cloudflare"
    delayBeforeCheck = 0