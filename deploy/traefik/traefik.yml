log:
  level: DEBUG

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    http:
      tls: {}

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    watch: true
    exposedByDefault: false

certificatesResolvers:
  cloudflare:
    acme:
      email: degterev907@gmail.com
      storage: /acme/acme.json
      dnsChallenge:
        provider: cloudflare