---
name: Infra Deploy Dev

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Apply Terraform and run Ansible reconciliation/deploy for development"
        required: true
        type: boolean
        default: true
      confirm_apply:
        description: "Type DEV to confirm development deployment."
        required: true
        type: string
        default: ""
      reconcile_nodes:
        description: "Run VPN node reconciliation playbook"
        required: true
        type: boolean
        default: false
      apply_infra_nodes:
        description: "Apply terraform/infra-nodes before Ansible deploy"
        required: true
        type: boolean
        default: false
      apply_nodes:
        description: "Apply terraform/nodes (disable for data-only dev runs)"
        required: true
        type: boolean
        default: false
      apply_foundation:
        description: "Apply terraform/foundation (disable to avoid foundation changes in dev run)"
        required: true
        type: boolean
        default: true
      replace_vpn_nodes:
        description: "Deprecated. Leave empty; use drain -> migrate -> deactivate lifecycle instead."
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: infra-dev-deploy
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TERRAFORM_VERSION: "1.8.5"
  PYTHON_VERSION: "3.10"

jobs:
  checks:
    uses: ./.github/workflows/infra-checks-reusable.yml

  deploy-dev:
    if: ${{ inputs.deploy == true && inputs.confirm_apply == 'DEV' }}
    needs: checks
    runs-on: [self-hosted, dev]
    timeout-minutes: 90
    environment:
      name: development
    steps:
      - uses: actions/checkout@v4

      - name: Write runtime env
        env:
          INFRA_ENV_DEV: ${{ secrets.INFRA_ENV_DEV }}
        run: |
          set -Eeuo pipefail
          test -n "${INFRA_ENV_DEV}" || { echo "::error::Missing secret INFRA_ENV_DEV"; exit 1; }
          forbidden_keys_regex='^(APPLY_FOUNDATION|APPLY_NODES|APPLY_INFRA_NODES|REPLACE_VPN_NODES)='
          if printf '%s\n' "${INFRA_ENV_DEV}" | grep -Eq "${forbidden_keys_regex}"; then
            echo "::error::INFRA_ENV_DEV must not define APPLY_FOUNDATION, APPLY_NODES, APPLY_INFRA_NODES, or REPLACE_VPN_NODES"
            exit 1
          fi
          ENV_FILE="${RUNNER_TEMP}/infra.dev.env"
          printf '%s\n' "${INFRA_ENV_DEV}" > "${ENV_FILE}"
          chmod 600 "${ENV_FILE}"
          echo "INFRA_ENV_FILE=${ENV_FILE}" >> "${GITHUB_ENV}"

      - name: Install Terraform CLI
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          case "$(uname -s)" in
            Linux) tf_os="linux" ;;
            Darwin) tf_os="darwin" ;;
            *)
              echo "::error::Unsupported runner OS: $(uname -s)"
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64|amd64) tf_arch="amd64" ;;
            arm64|aarch64) tf_arch="arm64" ;;
            *)
              echo "::error::Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac

          : "${TF_PROVIDER_MIRROR_URL:?Set TF_PROVIDER_MIRROR_URL in INFRA_ENV_DEV}"
          tf_zip="terraform_${TERRAFORM_VERSION}_${tf_os}_${tf_arch}.zip"
          tf_base_url="${TF_PROVIDER_MIRROR_URL}"
          tf_base_url="${tf_base_url%/}"
          if [ "${tf_base_url}" = "https://terraform-mirror.yandexcloud.net" ]; then
            tf_base_url="https://hashicorp-releases.yandexcloud.net/terraform"
          fi
          tf_url="${tf_base_url}/${TERRAFORM_VERSION}/${tf_zip}"
          tf_bin_dir="${RUNNER_TEMP}/bin"

          mkdir -p "${tf_bin_dir}"
          curl -fsSL "${tf_url}" -o "${RUNNER_TEMP}/${tf_zip}"
          unzip -oq "${RUNNER_TEMP}/${tf_zip}" -d "${tf_bin_dir}"
          chmod +x "${tf_bin_dir}/terraform"
          echo "${tf_bin_dir}" >> "${GITHUB_PATH}"
          "${tf_bin_dir}/terraform" version

      - name: Validate development isolation guardrails
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          source ./scripts/core/prepare-terraform-env.sh

          tf_enable_vpn_dev_stack="${TF_VAR_enable_vpn_dev_stack:-false}"
          reserved_control_vars=(
            APPLY_FOUNDATION
            APPLY_NODES
            APPLY_INFRA_NODES
            REPLACE_VPN_NODES
          )

          # Dev workflow must use a dev state scope.
          if [ -z "${TF_STATE_KEY_PREFIX:-}" ]; then
            echo "::error::TF_STATE_KEY_PREFIX must be set in INFRA_ENV_DEV"
            exit 1
          fi
          if ! printf '%s' "${TF_STATE_KEY_PREFIX}" | grep -Eq '(^|/)dev($|/)'; then
            echo "::error::TF_STATE_KEY_PREFIX must target dev scope (contains '/dev'): current='${TF_STATE_KEY_PREFIX}'"
            exit 1
          fi

          # Dev workflow must never deploy prod data stack.
          if [ "${DEPLOY_DATA_PROD_STACK:-false}" = "true" ]; then
            echo "::error::DEPLOY_DATA_PROD_STACK=true is forbidden in Infra Deploy Dev"
            exit 1
          fi

          if [ "${{ inputs.reconcile_nodes }}" = "true" ] && [ "${{ inputs.apply_nodes }}" != "true" ]; then
            echo "::error::reconcile_nodes=true requires apply_nodes=true in Infra Deploy Dev"
            exit 1
          fi

          for var_name in "${reserved_control_vars[@]}"; do
            if [ -n "${!var_name:-}" ]; then
              echo "::error::${var_name} must not be defined in INFRA_ENV_DEV. These controls come only from workflow_dispatch inputs."
              exit 1
            fi
          done

          if [ "${ENABLE_VPN_DEV_STACK:-false}" != "${tf_enable_vpn_dev_stack}" ]; then
            echo "::error::ENABLE_VPN_DEV_STACK (${ENABLE_VPN_DEV_STACK:-false}) must match Terraform toggle TF_VAR/IAC_TFVAR_enable_vpn_dev_stack (${tf_enable_vpn_dev_stack})"
            exit 1
          fi

          if [ "${tf_enable_vpn_dev_stack}" = "true" ] && [ "${{ inputs.apply_foundation }}" != "true" ]; then
            echo "::error::apply_foundation=true is required when vpn-dev stack is enabled, otherwise stale xray_config_dev from state may be reused"
            exit 1
          fi

          if [ "${tf_enable_vpn_dev_stack}" = "true" ]; then
            required_primary_tfvars=(
              TF_VAR_vpn_domain
              TF_VAR_vpn_ws_path
              TF_VAR_vpn_xhttp_path
              TF_VAR_vpn_reality_server_name
              TF_VAR_vpn_reality_private_key
              TF_VAR_vpn_reality_short_id
              TF_VAR_vpn_reality_dest_host
            )
            required_dev_tfvars=(
              TF_VAR_vpn_dev_domain
              TF_VAR_vpn_dev_ws_path
              TF_VAR_vpn_dev_xhttp_path
              TF_VAR_vpn_dev_reality_server_name
              TF_VAR_vpn_dev_reality_private_key
              TF_VAR_vpn_dev_reality_short_id
              TF_VAR_vpn_dev_reality_dest_host
            )

            for var_name in "${required_primary_tfvars[@]}" "${required_dev_tfvars[@]}"; do
              if [ -z "${!var_name:-}" ]; then
                echo "::error::${var_name} is required when vpn-dev stack is enabled"
                exit 1
              fi
            done
          fi

      - name: Resolve dev workflow scope
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          if [ "${ENABLE_VPN_DEV_STACK:-false}" = "true" ]; then
            echo "REQUIRE_NODE_AGENT_ENV=true" >> "${GITHUB_ENV}"
          else
            echo "REQUIRE_NODE_AGENT_ENV=false" >> "${GITHUB_ENV}"
          fi

      - name: Render node-agent env from GitHub Secrets
        if: ${{ env.REQUIRE_NODE_AGENT_ENV == 'true' }}
        env:
          NODE_AGENT_ENV_DEV: ${{ secrets.NODE_AGENT_ENV_DEV }}
          NODE_AGENT_ENV_DEV_B64: ${{ secrets.NODE_AGENT_ENV_DEV_B64 }}
        run: |
          set -Eeuo pipefail

          NODE_AGENT_ENV_FILE="${GITHUB_WORKSPACE}/node-agent.dev.env"
          if [ -n "${NODE_AGENT_ENV_DEV_B64}" ]; then
            printf '%s' "${NODE_AGENT_ENV_DEV_B64}" | base64 -d > "${NODE_AGENT_ENV_FILE}" || {
              echo "::error::Failed to decode NODE_AGENT_ENV_DEV_B64"
              exit 1
            }
          elif [ -n "${NODE_AGENT_ENV_DEV}" ]; then
            printf '%s\n' "${NODE_AGENT_ENV_DEV}" > "${NODE_AGENT_ENV_FILE}"
          else
            echo "::error::Missing NODE_AGENT_ENV_DEV or NODE_AGENT_ENV_DEV_B64 secret"
            exit 1
          fi

          chmod 600 "${NODE_AGENT_ENV_FILE}"
          if ! grep -Eq '^AGENT_CONTROL_API=.+$' "${NODE_AGENT_ENV_FILE}"; then
            echo "::error::node-agent env is invalid: AGENT_CONTROL_API is missing or empty"
            exit 1
          fi
          if ! grep -q '^NATS_SERVER=' "${NODE_AGENT_ENV_FILE}"; then
            echo "::error::node-agent env is invalid: NATS_SERVER is missing"
            exit 1
          fi
          nats_server_value="$(grep '^NATS_SERVER=' "${NODE_AGENT_ENV_FILE}" | tail -n1 | cut -d= -f2-)"
          if ! printf '%s' "${nats_server_value}" | grep -Eq '^nats://[^@]+@[^[:space:]]+$'; then
            echo "::error::node-agent env is invalid: NATS_SERVER must include credentials (expected nats://<token>@host:4222)"
            exit 1
          fi

      - name: Prepare SSH key for Ansible
        if: ${{ inputs.reconcile_nodes == true }}
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          KEYS_DIR="${RUNNER_TEMP}/ansible_ssh_keys"
          mkdir -p "${KEYS_DIR}"
          chmod 700 "${KEYS_DIR}"
          keys_written=0

          if [ -n "${ANSIBLE_SSH_KEYS_B64_JSON:-}" ]; then
            command -v python3 >/dev/null 2>&1 || {
              echo "::error::python3 is required to parse ANSIBLE_SSH_KEYS_B64_JSON"
              exit 1
            }

            export KEYS_DIR
            json_count="$(python3 ./scripts/core/render-ansible-ssh-keys.py --keys-dir "${KEYS_DIR}")"
            keys_written=$((keys_written + json_count))
          fi

          if [ -n "${ANSIBLE_SSH_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "${ANSIBLE_SSH_PRIVATE_KEY_B64}" | base64 -d > "${KEYS_DIR}/default" || {
              echo "::error::Failed to decode ANSIBLE_SSH_PRIVATE_KEY_B64"
              exit 1
            }
            chmod 600 "${KEYS_DIR}/default"
            keys_written=$((keys_written + 1))
          elif [ -n "${ANSIBLE_SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "${ANSIBLE_SSH_PRIVATE_KEY}" > "${KEYS_DIR}/default"
            chmod 600 "${KEYS_DIR}/default"
            keys_written=$((keys_written + 1))
          elif [ -n "${ANSIBLE_SSH_PRIVATE_KEY_FILE:-}" ]; then
            test -f "${ANSIBLE_SSH_PRIVATE_KEY_FILE}" || {
              echo "::error::ANSIBLE_SSH_PRIVATE_KEY_FILE points to a missing file: ${ANSIBLE_SSH_PRIVATE_KEY_FILE}"
              exit 1
            }
            cp "${ANSIBLE_SSH_PRIVATE_KEY_FILE}" "${KEYS_DIR}/default"
            chmod 600 "${KEYS_DIR}/default"
            keys_written=$((keys_written + 1))
          fi

          if [ "${keys_written}" -eq 0 ]; then
            echo "::error::Set ANSIBLE_SSH_KEYS_B64_JSON (recommended) or one of: ANSIBLE_SSH_PRIVATE_KEY_B64 / ANSIBLE_SSH_PRIVATE_KEY / ANSIBLE_SSH_PRIVATE_KEY_FILE in INFRA_ENV_DEV"
            exit 1
          fi

          for key_file in "${KEYS_DIR}"/*; do
            [ -f "${key_file}" ] || continue
            key_ref="$(basename "${key_file}")"
            if ! ssh-keygen -y -f "${key_file}" >/dev/null 2>&1; then
              echo "::error::SSH key ref '${key_ref}' is invalid or passphrase-protected; CI requires unencrypted private keys"
              exit 1
            fi
            key_fp_sha256="$(ssh-keygen -lf "${key_file}" -E sha256 | awk '{print $2}')"
            key_fp_md5="$(ssh-keygen -lf "${key_file}" -E md5 | awk '{print $2}' | sed 's/^MD5://')"
            echo "::notice::Loaded SSH key ref '${key_ref}' fingerprint md5=${key_fp_md5} sha256=${key_fp_sha256}"
          done

          echo "ANSIBLE_SSH_KEYS_DIR=${KEYS_DIR}" >> "${GITHUB_ENV}"
          if [ -f "${KEYS_DIR}/default" ]; then
            echo "ANSIBLE_SSH_PRIVATE_KEY_FILE=${KEYS_DIR}/default" >> "${GITHUB_ENV}"
          fi

      - name: Terraform apply
        env:
          WF_APPLY_FOUNDATION: ${{ inputs.apply_foundation }}
          WF_APPLY_NODES: ${{ inputs.apply_nodes }}
          WF_APPLY_INFRA_NODES: ${{ inputs.apply_infra_nodes }}
          WF_REPLACE_VPN_NODES: ${{ inputs.replace_vpn_nodes }}
          FOUNDATION_TFVARS_FILE: ${{ github.workspace }}/terraform/foundation/terraform.dev.tfvars
          NODES_TFVARS_FILE: ${{ github.workspace }}/terraform/nodes/catalog.dev.tfvars
          INFRA_NODES_TFVARS_FILE: ${{ github.workspace }}/terraform/infra-nodes/catalog.dev.tfvars
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export APPLY_FOUNDATION="${WF_APPLY_FOUNDATION}"
          export APPLY_NODES="${WF_APPLY_NODES}"
          export APPLY_INFRA_NODES="${WF_APPLY_INFRA_NODES}"
          export REPLACE_VPN_NODES="${WF_REPLACE_VPN_NODES}"
          bash ./scripts/ci/apply-terraform.sh

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements/dev.txt
            requirements/base.txt

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible

      - name: Verify HostVDS keypair fingerprints
        if: ${{ inputs.reconcile_nodes == true }}
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          inventory_file="ansible/inventory/generated/vpn_nodes.yml"
          if [ ! -f "${inventory_file}" ]; then
            echo "::error::Missing generated inventory file: ${inventory_file}"
            exit 1
          fi

          key_refs="$(awk '/ssh_key_ref:/{print $2}' "${inventory_file}" | tr -d '"' | sort -u | paste -sd, -)"
          if [ -z "${key_refs}" ]; then
            echo "::notice::No ssh_key_ref entries found in ${inventory_file}; skipping HostVDS keypair verification"
            exit 0
          fi

          python3 ./scripts/core/verify-hostvds-keypairs.py \
            --keys-dir "${ANSIBLE_SSH_KEYS_DIR}" \
            --refs "${key_refs}"

      - name: Reconcile VPN nodes (Ansible)
        if: ${{ inputs.reconcile_nodes == true }}
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export REPO_ROOT="${GITHUB_WORKSPACE}"
          export ANSIBLE_CONFIG="${GITHUB_WORKSPACE}/ansible/ansible.cfg"
          ansible-playbook -i ansible/inventory/development.ini \
            ansible/playbooks/reconcile-vpn-nodes.yml

      - name: Deploy stacks (Ansible)
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export REPO_ROOT="${GITHUB_WORKSPACE}"
          export ANSIBLE_CONFIG="${GITHUB_WORKSPACE}/ansible/ansible.cfg"
          ansible-playbook -i ansible/inventory/development.ini \
            ansible/playbooks/deploy-dev-stacks.yml

      - name: Reconcile node configs with control plane
        if: ${{ inputs.reconcile_nodes == true }}
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export ANSIBLE_CONFIG="${GITHUB_WORKSPACE}/ansible/ansible.cfg"
          ansible-playbook ansible/playbooks/reconcile-node-configs.yml

      - name: Cleanup
        if: always()
        run: |
          rm -f "${INFRA_ENV_FILE:-}"
          rm -f "${GITHUB_WORKSPACE}/node-agent.dev.env"
          rm -rf "${RUNNER_TEMP}/ansible_ssh_keys"
