---
name: Infra Deploy Dev

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Apply Terraform and reconcile node configs for development"
        required: true
        type: boolean
        default: true
      confirm_apply:
        description: "Type DEV to confirm development deployment."
        required: true
        type: string
        default: ""
      apply_infra_nodes:
        description: "Apply terraform/infra-nodes"
        required: true
        type: boolean
        default: false
      reconcile_nodes:
        description: "Reconcile VPN node configs with control plane API"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: infra-dev-deploy
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TERRAFORM_VERSION: "1.8.5"
  PYTHON_VERSION: "3.10"
  VAULT_KV_MOUNT: "kv"
  VAULT_INFRA_SECRET_PATH: "infra/dev"

jobs:
  checks:
    uses: ./.github/workflows/infra-checks-reusable.yml

  deploy-dev:
    if: ${{ inputs.deploy == true && inputs.confirm_apply == 'DEV' }}
    needs: checks
    runs-on: [self-hosted, dev]
    timeout-minutes: 90
    environment:
      name: development
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Vault auth inputs
        run: |
          set -Eeuo pipefail
          : "${VAULT_ADDR:?VAULT_ADDR must be set on the runner}"
          : "${VAULT_ROLE_ID:?VAULT_ROLE_ID must be set on the runner}"
          : "${VAULT_SECRET_ID:?VAULT_SECRET_ID must be set on the runner}"
          echo "::add-mask::${VAULT_ROLE_ID}"
          echo "::add-mask::${VAULT_SECRET_ID}"
          echo "VAULT_ADDR=${VAULT_ADDR}" >> "${GITHUB_ENV}"
          echo "VAULT_ROLE_ID=${VAULT_ROLE_ID}" >> "${GITHUB_ENV}"
          echo "VAULT_SECRET_ID=${VAULT_SECRET_ID}" >> "${GITHUB_ENV}"

      - name: Load infra env from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: approle
          roleId: ${{ env.VAULT_ROLE_ID }}
          secretId: ${{ env.VAULT_SECRET_ID }}
          secrets: |
            ${{ env.VAULT_KV_MOUNT }}/data/${{ env.VAULT_INFRA_SECRET_PATH }} config | INFRA_ENV_CONTENT ;

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements/dev.txt
            requirements/base.txt

      - name: Load runtime env from Vault
        run: |
          set -Eeuo pipefail
          ENV_FILE="${RUNNER_TEMP}/infra.dev.env"
          printf '%s\n' "${INFRA_ENV_CONTENT}" > "${ENV_FILE}"
          chmod 600 "${ENV_FILE}"
          echo "INFRA_ENV_FILE=${ENV_FILE}" >> "${GITHUB_ENV}"

      - name: Install Terraform CLI
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          case "$(uname -s)" in
            Linux) tf_os="linux" ;;
            Darwin) tf_os="darwin" ;;
            *)
              echo "::error::Unsupported runner OS: $(uname -s)"
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64|amd64) tf_arch="amd64" ;;
            arm64|aarch64) tf_arch="arm64" ;;
            *)
              echo "::error::Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac

          : "${TF_PROVIDER_MIRROR_URL:?Set TF_PROVIDER_MIRROR_URL in INFRA_ENV_DEV}"
          tf_zip="terraform_${TERRAFORM_VERSION}_${tf_os}_${tf_arch}.zip"
          tf_base_url="${TF_PROVIDER_MIRROR_URL}"
          tf_base_url="${tf_base_url%/}"
          if [ "${tf_base_url}" = "https://terraform-mirror.yandexcloud.net" ]; then
            tf_base_url="https://hashicorp-releases.yandexcloud.net/terraform"
          fi
          tf_url="${tf_base_url}/${TERRAFORM_VERSION}/${tf_zip}"
          tf_bin_dir="${RUNNER_TEMP}/bin"

          mkdir -p "${tf_bin_dir}"
          curl -fsSL "${tf_url}" -o "${RUNNER_TEMP}/${tf_zip}"
          unzip -oq "${RUNNER_TEMP}/${tf_zip}" -d "${tf_bin_dir}"
          chmod +x "${tf_bin_dir}/terraform"
          echo "${tf_bin_dir}" >> "${GITHUB_PATH}"
          "${tf_bin_dir}/terraform" version

      - name: Terraform apply
        env:
          APPLY_INFRA_NODES: ${{ inputs.apply_infra_nodes }}
          NODES_TFVARS_FILE: ${{ github.workspace }}/terraform/nodes/catalog.dev.tfvars
          INFRA_NODES_TFVARS_FILE: ${{ github.workspace }}/terraform/infra-nodes/catalog.dev.tfvars
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          if [ -n "${YC_SERVICE_ACCOUNT_KEY_B64:-}" ]; then
            YC_SA_KEY_FILE="${RUNNER_TEMP}/yc-sa-key.json"
            printf '%s' "${YC_SERVICE_ACCOUNT_KEY_B64}" | base64 -d > "${YC_SA_KEY_FILE}"
            chmod 600 "${YC_SA_KEY_FILE}"
            export YC_SERVICE_ACCOUNT_KEY_FILE="${YC_SA_KEY_FILE}"
            export TF_VAR_yandex_service_account_key_file="${YC_SA_KEY_FILE}"
            unset YC_TOKEN || true
            unset TF_VAR_yandex_token || true
          fi

          bash ./scripts/ci/apply-terraform.sh

      - name: Install Ansible
        if: ${{ inputs.reconcile_nodes == true }}
        run: python -m pip install --upgrade pip ansible

      - name: Reconcile node configs with control plane
        if: ${{ inputs.reconcile_nodes == true }}
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export ANSIBLE_CONFIG="${GITHUB_WORKSPACE}/ansible/ansible.cfg"
          ansible-playbook ansible/playbooks/reconcile-node-configs.yml

      - name: Cleanup
        if: always()
        run: |
          rm -f "${INFRA_ENV_FILE:-}"
          rm -f "${RUNNER_TEMP}/yc-sa-key.json"
