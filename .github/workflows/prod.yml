name: Deploy infra Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-monitoring:
    runs-on: [self-hosted, dev]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Write infra env
        run: |
          echo "${{ secrets.INFRA_ENV_PROD }}" > .env
      - name: Bootstrap infra (networks, volumes, etc)
        run: |
          set -e
          cd /opt/vpn-infra     
          git fetch origin
          git reset --hard origin/main
          git clean -fd 
          ./scripts/bootstrap.sh
      - name: Deploy Traefik
        run: |
          docker stack deploy --with-registry-auth -c docker/stacks/traefik.yml traefik
      - name: Deploy Monitoring
        run: |
          docker stack deploy --with-registry-auth -c docker/stacks/monitoring.yml monitoring
      - name: Deploy Swarmpit
        run: |
          docker stack deploy --with-registry-auth -c docker/stacks/swarmpit.yml swarmpit
      - name: Deploy VPN stack
        run: |
          docker stack deploy --with-registry-auth -c docker/stacks/vpn-xray.yml vpn
      - name: Infra sanity check
        env:
          INFRA_ROLE: manager
        run: |
          ./scripts/sanity-check.sh
