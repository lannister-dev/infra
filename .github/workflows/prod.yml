name: Deploy infra Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-monitoring:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Deploy monitoring to Infra server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MONITORING_HOST }}
          username: root
          key: ${{ secrets.MONITORING_SSH_KEY }}
          script: |
            set -e  
            cd /opt/vpn-infra || exit 1
            
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            
            echo "${{ secrets.INFRA_ENV_PROD }}" > .env
            
            ./scripts/bootstrap.sh
            
            docker stack deploy --env-file ./.bootstrap.env -c docker/stacks/traefik.yml traefik
            docker stack deploy --env-file ./.bootstrap.env -c docker/stacks/monitoring.yml monitoring