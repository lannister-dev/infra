---
name: Infra Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Apply Terraform and run Ansible reconciliation/deploy"
        required: true
        type: boolean
        default: true
      confirm_apply:
        description: "Type APPLY to confirm production deployment."
        required: true
        type: string
        default: ""
      reconcile_nodes:
        description: "Run VPN node reconciliation playbook"
        required: true
        type: boolean
        default: true
      apply_infra_nodes:
        description: "Apply terraform/infra-nodes before Ansible deploy"
        required: true
        type: boolean
        default: false
      replace_vpn_nodes:
        description: "Deprecated. Leave empty; use drain -> migrate -> deactivate lifecycle instead."
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: infra-prod-deploy
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TERRAFORM_VERSION: "1.8.5"
  PYTHON_VERSION: "3.10"
  VAULT_KV_MOUNT: "kv"
  VAULT_INFRA_SECRET_PATH: "infra/prod"
  VAULT_NODE_AGENT_SECRET_PATH: "node-agent/prod"

jobs:
  checks:
    uses: ./.github/workflows/infra-checks-reusable.yml

  deploy-prod:
    if: ${{ inputs.deploy == true && inputs.confirm_apply == 'APPLY' }}
    needs: checks
    runs-on: [self-hosted, prod]
    timeout-minutes: 90
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Vault auth inputs
        run: |
          set -Eeuo pipefail
          : "${VAULT_ADDR:?VAULT_ADDR must be set on the runner}"
          echo "VAULT_ACTION_URL=${VAULT_ADDR}" >> "${GITHUB_ENV}"
          if [ -n "${VAULT_NAMESPACE:-}" ]; then
            echo "VAULT_ACTION_NAMESPACE=${VAULT_NAMESPACE}" >> "${GITHUB_ENV}"
          fi
          if [ -n "${VAULT_TOKEN:-}" ]; then
            echo "::add-mask::${VAULT_TOKEN}"
            echo "VAULT_ACTION_METHOD=token" >> "${GITHUB_ENV}"
            echo "VAULT_ACTION_TOKEN=${VAULT_TOKEN}" >> "${GITHUB_ENV}"
          else
            : "${VAULT_ROLE_ID:?Set VAULT_TOKEN or VAULT_ROLE_ID on the runner}"
            : "${VAULT_SECRET_ID:?Set VAULT_TOKEN or VAULT_SECRET_ID on the runner}"
            echo "::add-mask::${VAULT_ROLE_ID}"
            echo "::add-mask::${VAULT_SECRET_ID}"
            echo "VAULT_ACTION_METHOD=approle" >> "${GITHUB_ENV}"
            echo "VAULT_ACTION_ROLE_ID=${VAULT_ROLE_ID}" >> "${GITHUB_ENV}"
            echo "VAULT_ACTION_SECRET_ID=${VAULT_SECRET_ID}" >> "${GITHUB_ENV}"
          fi

      - name: Load infra env from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ACTION_URL }}
          namespace: ${{ env.VAULT_ACTION_NAMESPACE }}
          method: ${{ env.VAULT_ACTION_METHOD }}
          token: ${{ env.VAULT_ACTION_TOKEN }}
          roleId: ${{ env.VAULT_ACTION_ROLE_ID }}
          secretId: ${{ env.VAULT_ACTION_SECRET_ID }}
          secrets: |
            ${{ env.VAULT_KV_MOUNT }}/data/${{ env.VAULT_INFRA_SECRET_PATH }} config | INFRA_ENV_CONTENT ;

      - name: Load node-agent env from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ACTION_URL }}
          namespace: ${{ env.VAULT_ACTION_NAMESPACE }}
          method: ${{ env.VAULT_ACTION_METHOD }}
          token: ${{ env.VAULT_ACTION_TOKEN }}
          roleId: ${{ env.VAULT_ACTION_ROLE_ID }}
          secretId: ${{ env.VAULT_ACTION_SECRET_ID }}
          secrets: |
            ${{ env.VAULT_KV_MOUNT }}/data/${{ env.VAULT_NODE_AGENT_SECRET_PATH }} config | NODE_AGENT_ENV_CONTENT ;

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements/dev.txt
            requirements/base.txt

      - name: Load runtime env from Vault
        run: |
          set -Eeuo pipefail
          ENV_FILE="${RUNNER_TEMP}/infra.env"
          printf '%s\n' "${INFRA_ENV_CONTENT}" > "${ENV_FILE}"
          chmod 600 "${ENV_FILE}"
          echo "INFRA_ENV_FILE=${ENV_FILE}" >> "${GITHUB_ENV}"

      - name: Install Terraform CLI
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          case "$(uname -s)" in
            Linux) tf_os="linux" ;;
            Darwin) tf_os="darwin" ;;
            *)
              echo "::error::Unsupported runner OS: $(uname -s)"
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64|amd64) tf_arch="amd64" ;;
            arm64|aarch64) tf_arch="arm64" ;;
            *)
              echo "::error::Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac

          : "${TF_PROVIDER_MIRROR_URL:?Set TF_PROVIDER_MIRROR_URL in INFRA_ENV_PROD}"
          tf_zip="terraform_${TERRAFORM_VERSION}_${tf_os}_${tf_arch}.zip"
          tf_base_url="${TF_PROVIDER_MIRROR_URL}"
          tf_base_url="${tf_base_url%/}"
          if [ "${tf_base_url}" = "https://terraform-mirror.yandexcloud.net" ]; then
            tf_base_url="https://hashicorp-releases.yandexcloud.net/terraform"
          fi
          tf_url="${tf_base_url}/${TERRAFORM_VERSION}/${tf_zip}"
          tf_bin_dir="${RUNNER_TEMP}/bin"

          mkdir -p "${tf_bin_dir}"
          curl -fsSL "${tf_url}" -o "${RUNNER_TEMP}/${tf_zip}"
          unzip -oq "${RUNNER_TEMP}/${tf_zip}" -d "${tf_bin_dir}"
          chmod +x "${tf_bin_dir}/terraform"
          echo "${tf_bin_dir}" >> "${GITHUB_PATH}"
          "${tf_bin_dir}/terraform" version

      - name: Validate production isolation guardrails
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          source ./scripts/core/prepare-terraform-env.sh

          required_primary_tfvars=(
            TF_VAR_vpn_domain
            TF_VAR_vpn_ws_path
            TF_VAR_vpn_xhttp_path
            TF_VAR_vpn_reality_server_name
            TF_VAR_vpn_reality_private_key
            TF_VAR_vpn_reality_short_id
            TF_VAR_vpn_reality_dest_host
          )

          if [ -z "${TF_STATE_KEY_PREFIX:-}" ]; then
            echo "::error::TF_STATE_KEY_PREFIX must be set in INFRA_ENV_PROD"
            exit 1
          fi
          if printf '%s' "${TF_STATE_KEY_PREFIX}" | grep -Eq '(^|/)dev($|/)'; then
            echo "::error::TF_STATE_KEY_PREFIX must not target dev scope in Infra Deploy: current='${TF_STATE_KEY_PREFIX}'"
            exit 1
          fi
          if [ "${DEPLOY_DATA_DEV_STACK:-false}" = "true" ]; then
            echo "::error::DEPLOY_DATA_DEV_STACK=true is forbidden in Infra Deploy"
            exit 1
          fi

          for var_name in "${required_primary_tfvars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              alias_name="IAC_TFVAR_${var_name#TF_VAR_}"
              alias_name="${alias_name^^}"
              echo "::error::${var_name} is required in INFRA_ENV_PROD (or set ${alias_name})"
              exit 1
            fi
          done

      - name: Render node-agent env from Vault
        run: |
          set -Eeuo pipefail

          NODE_AGENT_ENV_FILE="${GITHUB_WORKSPACE}/node-agent.env"
          printf '%s\n' "${NODE_AGENT_ENV_CONTENT}" > "${NODE_AGENT_ENV_FILE}"
          chmod 600 "${NODE_AGENT_ENV_FILE}"
          if ! grep -q '^AGENT_CONTROL_API=' "${NODE_AGENT_ENV_FILE}"; then
            echo "::error::node-agent env is invalid: AGENT_CONTROL_API is missing"
            exit 1
          fi
          if ! grep -q '^NATS_SERVER=' "${NODE_AGENT_ENV_FILE}"; then
            echo "::error::node-agent env is invalid: NATS_SERVER is missing"
            exit 1
          fi
          nats_server_value="$(grep '^NATS_SERVER=' "${NODE_AGENT_ENV_FILE}" | tail -n1 | cut -d= -f2-)"
          if ! printf '%s' "${nats_server_value}" | grep -Eq '^nats://[^@]+@[^[:space:]]+$'; then
            echo "::error::node-agent env is invalid: NATS_SERVER must include credentials (expected nats://<token>@host:4222)"
            exit 1
          fi

      - name: Prepare SSH key for Ansible
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          KEYS_DIR="${RUNNER_TEMP}/ansible_ssh_keys"
          mkdir -p "${KEYS_DIR}"
          chmod 700 "${KEYS_DIR}"
          keys_written=0

          if [ -n "${ANSIBLE_SSH_KEYS_B64_JSON:-}" ]; then
            command -v python3 >/dev/null 2>&1 || {
              echo "::error::python3 is required to parse ANSIBLE_SSH_KEYS_B64_JSON"
              exit 1
            }

            export KEYS_DIR
            json_count="$(python3 ./scripts/core/render-ansible-ssh-keys.py --keys-dir "${KEYS_DIR}")"
            keys_written=$((keys_written + json_count))
          fi

          if [ -n "${ANSIBLE_SSH_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "${ANSIBLE_SSH_PRIVATE_KEY_B64}" | base64 -d > "${KEYS_DIR}/default" || {
              echo "::error::Failed to decode ANSIBLE_SSH_PRIVATE_KEY_B64"
              exit 1
            }
            chmod 600 "${KEYS_DIR}/default"
            keys_written=$((keys_written + 1))
          elif [ -n "${ANSIBLE_SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "${ANSIBLE_SSH_PRIVATE_KEY}" > "${KEYS_DIR}/default"
            chmod 600 "${KEYS_DIR}/default"
            keys_written=$((keys_written + 1))
          elif [ -n "${ANSIBLE_SSH_PRIVATE_KEY_FILE:-}" ]; then
            test -f "${ANSIBLE_SSH_PRIVATE_KEY_FILE}" || {
              echo "::error::ANSIBLE_SSH_PRIVATE_KEY_FILE points to a missing file: ${ANSIBLE_SSH_PRIVATE_KEY_FILE}"
              exit 1
            }
            cp "${ANSIBLE_SSH_PRIVATE_KEY_FILE}" "${KEYS_DIR}/default"
            chmod 600 "${KEYS_DIR}/default"
            keys_written=$((keys_written + 1))
          fi

          if [ "${keys_written}" -eq 0 ]; then
            echo "::error::Set ANSIBLE_SSH_KEYS_B64_JSON (recommended) or one of: ANSIBLE_SSH_PRIVATE_KEY_B64 / ANSIBLE_SSH_PRIVATE_KEY / ANSIBLE_SSH_PRIVATE_KEY_FILE in INFRA_ENV_PROD"
            exit 1
          fi

          for key_file in "${KEYS_DIR}"/*; do
            [ -f "${key_file}" ] || continue
            key_ref="$(basename "${key_file}")"
            if ! ssh-keygen -y -f "${key_file}" >/dev/null 2>&1; then
              echo "::error::SSH key ref '${key_ref}' is invalid or passphrase-protected; CI requires unencrypted private keys"
              exit 1
            fi
            key_fp_sha256="$(ssh-keygen -lf "${key_file}" -E sha256 | awk '{print $2}')"
            key_fp_md5="$(ssh-keygen -lf "${key_file}" -E md5 | awk '{print $2}' | sed 's/^MD5://')"
            echo "::notice::Loaded SSH key ref '${key_ref}' fingerprint md5=${key_fp_md5} sha256=${key_fp_sha256}"
          done

          echo "ANSIBLE_SSH_KEYS_DIR=${KEYS_DIR}" >> "${GITHUB_ENV}"
          if [ -f "${KEYS_DIR}/default" ]; then
            echo "ANSIBLE_SSH_PRIVATE_KEY_FILE=${KEYS_DIR}/default" >> "${GITHUB_ENV}"
          fi

      - name: Terraform apply
        env:
          APPLY_INFRA_NODES: ${{ inputs.apply_infra_nodes }}
          REPLACE_VPN_NODES: ${{ inputs.replace_vpn_nodes }}
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          bash ./scripts/ci/apply-terraform.sh

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible

      - name: Verify HostVDS keypair fingerprints
        if: ${{ inputs.reconcile_nodes == true }}
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          inventory_file="ansible/inventory/generated/vpn_nodes.yml"
          if [ ! -f "${inventory_file}" ]; then
            echo "::error::Missing generated inventory file: ${inventory_file}"
            exit 1
          fi

          key_refs="$(awk '/ssh_key_ref:/{print $2}' "${inventory_file}" | tr -d '"' | sort -u | paste -sd, -)"
          if [ -z "${key_refs}" ]; then
            echo "::notice::No ssh_key_ref entries found in ${inventory_file}; skipping HostVDS keypair verification"
            exit 0
          fi

          missing_refs=""
          IFS=',' read -r -a key_ref_list <<< "${key_refs}"
          for key_ref in "${key_ref_list[@]}"; do
            [ -n "${key_ref}" ] || continue
            if [ ! -f "${ANSIBLE_SSH_KEYS_DIR}/${key_ref}" ]; then
              missing_refs="${missing_refs}${missing_refs:+,}${key_ref}"
            fi
          done
          if [ -n "${missing_refs}" ]; then
            echo "::error::Missing SSH key refs required by ${inventory_file}: ${missing_refs}. Add them to ANSIBLE_SSH_KEYS_B64_JSON in INFRA_ENV_PROD."
            exit 1
          fi

          python3 ./scripts/core/verify-hostvds-keypairs.py \
            --keys-dir "${ANSIBLE_SSH_KEYS_DIR}" \
            --refs "${key_refs}"

      - name: Reconcile VPN nodes (Ansible)
        if: ${{ inputs.reconcile_nodes == true }}
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export REPO_ROOT="${GITHUB_WORKSPACE}"
          export ANSIBLE_CONFIG="${GITHUB_WORKSPACE}/ansible/ansible.cfg"
          ansible-playbook -i ansible/inventory/production.ini \
            ansible/playbooks/reconcile-vpn-nodes.yml

      - name: Deploy stacks (Ansible)
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export REPO_ROOT="${GITHUB_WORKSPACE}"
          export RUN_SANITY_CHECK="true"
          export ANSIBLE_CONFIG="${GITHUB_WORKSPACE}/ansible/ansible.cfg"
          ansible-playbook -i ansible/inventory/production.ini \
            ansible/playbooks/deploy-stacks.yml

      - name: Reconcile node configs with control plane
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export ANSIBLE_CONFIG="${GITHUB_WORKSPACE}/ansible/ansible.cfg"
          ansible-playbook ansible/playbooks/reconcile-node-configs.yml

      - name: Cleanup
        if: always()
        run: |
          rm -f "${INFRA_ENV_FILE:-}"
          rm -f "${GITHUB_WORKSPACE}/node-agent.env"
          rm -rf "${RUNNER_TEMP}/ansible_ssh_keys"
