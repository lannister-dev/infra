---
name: Publish VPN Profiles

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profiles.yml"
      - "pyproject.toml"
      - "requirements/profiles-ci.txt"
      - "vpn/xray/config.json.j2"
      - "vpn/xray/artifact.overrides.yml"
      - "services/profiles/**/*.py"
      - "shared/api/**/*.py"
      - "tests/profiles/**/*.py"
  workflow_dispatch:

env:
  VAULT_KV_MOUNT: "kv"
  VAULT_PROFILES_SECRET_PATH: "infra/prod"

jobs:
  validate-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: python -m pip install -r requirements/profiles-ci.txt
      - name: Lint profiles package
        run: ruff check services/profiles shared/api tests/profiles
      - name: Type check profiles package
        run: mypy services/profiles shared/api
      - name: Run tests
        run: pytest tests/profiles -q
      - name: Validate prod profiles
        run: python -m services.profiles.cli.validate --overrides vpn/xray/artifact.overrides.yml
      - name: Build prod artifact payload
        run: python -m services.profiles.cli.build --overrides vpn/xray/artifact.overrides.yml --output artifacts/profiles/artifact.prod.json --print

  publish-prod:
    needs: validate-prod
    runs-on: [self-hosted, prod]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Vault auth inputs
        run: |
          set -Eeuo pipefail
          : "${VAULT_ADDR:?VAULT_ADDR must be set on the runner}"
          : "${VAULT_ROLE_ID:?VAULT_ROLE_ID must be set on the runner}"
          : "${VAULT_SECRET_ID:?VAULT_SECRET_ID must be set on the runner}"
          echo "::add-mask::${VAULT_ROLE_ID}"
          echo "::add-mask::${VAULT_SECRET_ID}"
          echo "VAULT_ADDR=${VAULT_ADDR}" >> "${GITHUB_ENV}"
          echo "VAULT_ROLE_ID=${VAULT_ROLE_ID}" >> "${GITHUB_ENV}"
          echo "VAULT_SECRET_ID=${VAULT_SECRET_ID}" >> "${GITHUB_ENV}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: python -m pip install -r requirements/profiles-ci.txt
      - name: Load publish credentials from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: approle
          roleId: ${{ env.VAULT_ROLE_ID }}
          secretId: ${{ env.VAULT_SECRET_ID }}
          secrets: |
            ${{ env.VAULT_KV_MOUNT }}/data/${{ env.VAULT_PROFILES_SECRET_PATH }} control_plane_url | CONTROL_PLANE_URL ;
            ${{ env.VAULT_KV_MOUNT }}/data/${{ env.VAULT_PROFILES_SECRET_PATH }} admin_api_key | ADMIN_API_KEY ;
      - name: Publish prod artifact to control plane
        run: python -m services.profiles.cli.build --overrides vpn/xray/artifact.overrides.yml --output artifacts/profiles/artifact.prod.json --publish
