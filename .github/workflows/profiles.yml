name: Publish VPN Profiles

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profiles.yml"
      - "pyproject.toml"
      - "requirements/profiles-ci.txt"
      - "vpn/xray/config.json.j2"
      - "vpn/xray/artifact.overrides.yml"
      - "scripts/profiles/**/*.py"
  workflow_dispatch:

jobs:
  validate-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: python -m pip install -r requirements/profiles-ci.txt
      - name: Lint profiles package
        run: ruff check scripts/profiles
      - name: Type check profiles package
        run: mypy scripts/profiles
      - name: Run tests
        run: pytest scripts/profiles/tests -q
      - name: Validate prod profiles
        run: python -m scripts.profiles.validate_profiles --overrides vpn/xray/artifact.overrides.yml
      - name: Build prod artifact payload
        run: python -m scripts.profiles.generate_profiles_artifact --overrides vpn/xray/artifact.overrides.yml --output artifacts/profiles/artifact.prod.json --print

  publish-prod:
    needs: validate-prod
    runs-on: [self-hosted, dev]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: python -m pip install -r requirements/profiles-ci.txt
      - name: Check prod secrets
        env:
          CONTROL_PLANE_URL: ${{ secrets.CONTROL_PLANE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          test -n "$CONTROL_PLANE_URL" || (echo "Missing secret: CONTROL_PLANE_URL" && exit 1)
          test -n "$ADMIN_API_KEY" || (echo "Missing secret: ADMIN_API_KEY" && exit 1)
      - name: Publish prod artifact to control plane
        env:
          CONTROL_PLANE_URL: ${{ secrets.CONTROL_PLANE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: python -m scripts.profiles.generate_profiles_artifact --overrides vpn/xray/artifact.overrides.yml --output artifacts/profiles/artifact.prod.json --publish
