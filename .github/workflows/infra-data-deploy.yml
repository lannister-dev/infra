---
name: Infra Data Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy only production data services (postgres/redis)"
        required: true
        type: boolean
        default: true
      confirm_apply:
        description: "Type PROD-DATA to confirm production data deployment."
        required: true
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: infra-prod-data-deploy
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"
  VAULT_KV_MOUNT: "kv"
  VAULT_INFRA_SECRET_PATH: "infra/prod"

jobs:
  checks:
    uses: ./.github/workflows/infra-checks-reusable.yml

  deploy-prod-data:
    if: ${{ inputs.deploy == true && inputs.confirm_apply == 'PROD-DATA' }}
    needs: checks
    runs-on: [self-hosted, dev]
    timeout-minutes: 45
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Vault auth inputs
        run: |
          set -Eeuo pipefail
          : "${VAULT_ADDR:?VAULT_ADDR must be set on the runner}"
          : "${VAULT_ROLE_ID:?VAULT_ROLE_ID must be set on the runner}"
          : "${VAULT_SECRET_ID:?VAULT_SECRET_ID must be set on the runner}"
          echo "::add-mask::${VAULT_ROLE_ID}"
          echo "::add-mask::${VAULT_SECRET_ID}"
          echo "VAULT_ADDR=${VAULT_ADDR}" >> "${GITHUB_ENV}"
          echo "VAULT_ROLE_ID=${VAULT_ROLE_ID}" >> "${GITHUB_ENV}"
          echo "VAULT_SECRET_ID=${VAULT_SECRET_ID}" >> "${GITHUB_ENV}"

      - name: Load infra env from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: approle
          roleId: ${{ env.VAULT_ROLE_ID }}
          secretId: ${{ env.VAULT_SECRET_ID }}
          secrets: |
            ${{ env.VAULT_KV_MOUNT }}/data/${{ env.VAULT_INFRA_SECRET_PATH }} config | INFRA_ENV_CONTENT ;

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements/dev.txt
            requirements/base.txt

      - name: Load runtime env from Vault
        run: |
          set -Eeuo pipefail
          ENV_FILE="${RUNNER_TEMP}/infra.prod.env"
          printf '%s\n' "${INFRA_ENV_CONTENT}" > "${ENV_FILE}"
          chmod 600 "${ENV_FILE}"
          echo "INFRA_ENV_FILE=${ENV_FILE}" >> "${GITHUB_ENV}"

      - name: Validate production data-only guardrails
        run: |
          set -Eeuo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u

          if [ -z "${TF_STATE_KEY_PREFIX:-}" ]; then
            echo "::error::TF_STATE_KEY_PREFIX must be set in INFRA_ENV_PROD"
            exit 1
          fi
          if printf '%s' "${TF_STATE_KEY_PREFIX}" | grep -Eq '(^|/)dev($|/)'; then
            echo "::error::TF_STATE_KEY_PREFIX must not target dev scope in Infra Data Deploy"
            exit 1
          fi
          if [ "${DEPLOY_DATA_DEV_STACK:-false}" = "true" ]; then
            echo "::error::DEPLOY_DATA_DEV_STACK=true is forbidden in Infra Data Deploy"
            exit 1
          fi
          if [ "${DEPLOY_DATA_PROD_STACK:-false}" != "true" ]; then
            echo "::error::DEPLOY_DATA_PROD_STACK=true is required for Infra Data Deploy"
            exit 1
          fi

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible

      - name: Deploy production data stack
        run: |
          set -Eeo pipefail
          set -a; source "${INFRA_ENV_FILE}"; set +a; set -u
          export REPO_ROOT="${GITHUB_WORKSPACE}"
          export ANSIBLE_CONFIG="${GITHUB_WORKSPACE}/ansible/ansible.cfg"
          ansible-playbook -i ansible/inventory/production.ini \
            ansible/playbooks/deploy-data-stacks.yml

      - name: Cleanup
        if: always()
        run: rm -f "${INFRA_ENV_FILE:-}"
