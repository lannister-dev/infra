global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: default
      group_wait: 10s
      repeat_interval: 1h

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, service]

receivers:
  - name: default
    webhook_configs:
      - url: "http://placeholder:5001/alert"
        send_resolved: true
