---
x-healthcheck-common: &healthcheck-common
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

x-deploy-common: &deploy-common
  mode: global
  placement:
    constraints:
      - node.labels.role == vpn
      - node.labels.channel == dev
  update_config:
    order: stop-first
    monitor: 2m
    failure_action: rollback
  rollback_config:
    order: stop-first
    monitor: 2m
  restart_policy:
    condition: on-failure

x-node-agent-deploy-common: &node-agent-deploy-common
  mode: global
  placement:
    constraints:
      - node.labels.role == vpn
      - node.labels.channel == dev
  update_config:
    order: stop-first
    monitor: 2m
    failure_action: rollback
  rollback_config:
    order: stop-first
    monitor: 2m
  restart_policy:
    condition: on-failure

services:
  xray:
    image: ghcr.io/xtls/xray-core:${XRAY_IMAGE_TAG}
    ports:
      - target: 10002
        published: 443
        protocol: tcp
        mode: host
    networks:
      - traefik_swarm
      - vpn-dev-net
      - monitoring
    configs:
      - source: xray_config_dev
        target: /etc/xray/config.json
        mode: 292
    command: ["run", "-config", "/etc/xray/config.json"]
    healthcheck:
      <<: *healthcheck-common
      test: ["CMD", "xray", "version"]
    deploy:
      <<: *deploy-common
      labels:
        - traefik.enable=true

        # ===== DEV WS =====
        - traefik.http.routers.vpn-dev-ws.rule=Host(`${VPN_DEV_DOMAIN}`) && PathPrefix(`${VPN_DEV_WS_PATH}`)
        - traefik.http.routers.vpn-dev-ws.entrypoints=websecure
        - traefik.http.routers.vpn-dev-ws.tls=true
        - traefik.http.routers.vpn-dev-ws.tls.certresolver=cf
        - traefik.http.routers.vpn-dev-ws.priority=200
        - traefik.http.routers.vpn-dev-ws.service=vpn-dev-ws
        - traefik.http.services.vpn-dev-ws.loadbalancer.server.port=10000

        # ===== DEV XHTTP =====
        - traefik.http.routers.vpn-dev-xhttp.rule=Host(`${VPN_DEV_DOMAIN}`) && PathPrefix(`${VPN_DEV_XHTTP_PATH}`)
        - traefik.http.routers.vpn-dev-xhttp.entrypoints=websecure
        - traefik.http.routers.vpn-dev-xhttp.tls=true
        - traefik.http.routers.vpn-dev-xhttp.tls.certresolver=cf
        - traefik.http.routers.vpn-dev-xhttp.priority=190
        - traefik.http.routers.vpn-dev-xhttp.service=vpn-dev-xhttp
        - traefik.http.services.vpn-dev-xhttp.loadbalancer.server.port=10001

  node-agent:
    image: ${NODE_AGENT_IMAGE_REF_DEV:-harbor.lannister-dev.ru/vpn-service/node-agent:prod}
    command: ["python", "app.py"]
    networks:
      - vpn-dev-net
      - monitoring
    secrets:
      - bootstrap_token
    volumes:
      - agent-data:/data
    environment:
      AGENT_BOOTSTRAP_TOKEN_FILE: /run/secrets/bootstrap_token
      AGENT_IDENTITY_PATH: /data/node_identity.json
      AGENT_NODE_KEY: "{{.Node.Hostname}}"
    env_file:
      - ../../node-agent.dev.env
    healthcheck:
      <<: *healthcheck-common
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/healthz', timeout=2).read(); print('ok')"]
    deploy:
      <<: *node-agent-deploy-common
      labels:
        - "prometheus-scrape=true"
        - "prometheus-app=node-agent"
        - "prometheus-env=dev"
        - "prometheus-metrics-port=9000"
        - "prometheus-metrics-path=/metrics"
        - "prometheus-scrape-profile=important"

configs:
  xray_config_dev:
    external: true
    name: ${XRAY_CONFIG_DEV_NAME}

volumes:
  agent-data:
secrets:
  bootstrap_token:
    external: true

networks:
  traefik_swarm:
    external: true
  vpn-dev-net:
    external: true
    name: ${VPN_DEV_NETWORK_NAME:-vpn-dev-net}
  monitoring:
    external: true
