---
x-healthcheck-common: &healthcheck-common
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

x-deploy-common: &deploy-common
  mode: global
  placement:
    constraints:
      - node.labels.role == vpn
      - node.labels.traffic_role == whitelist_entry
  update_config:
    order: stop-first
    monitor: 2m
    failure_action: rollback
  rollback_config:
    order: stop-first
    monitor: 2m
  restart_policy:
    condition: any

services:
  relay:
    image: haproxy:${HAPROXY_ALPINE_IMAGE_TAG}
    ports:
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    configs:
      - source: relay_config_template
        target: /usr/local/etc/haproxy/haproxy.cfg.template
        mode: 292
    volumes:
      - shared:/shared
    command:
      - /bin/sh
      - -ec
      - |
        sed \
          -e "s#__UPSTREAM_HOST__#${VPN_WHITELIST_ENTRY_UPSTREAM_HOST}#g" \
          -e "s#__UPSTREAM_PORT__#${VPN_WHITELIST_ENTRY_UPSTREAM_PORT}#g" \
          /usr/local/etc/haproxy/haproxy.cfg.template > /tmp/haproxy.cfg
        exec haproxy -W -db -f /tmp/haproxy.cfg
    healthcheck:
      <<: *healthcheck-common
      test: ["CMD", "haproxy", "-c", "-f", "/tmp/haproxy.cfg"]
    deploy:
      <<: *deploy-common

volumes:
  shared:
    name: entry-shared

configs:
  relay_config_template:
    external: true
    name: ${VPN_WHITELIST_ENTRY_RELAY_CONFIG_NAME}
