---
# ======= deploy services ========
x-deploy-common: &deploy-common
  replicas: 1
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first
    failure_action: rollback
  restart_policy:
    condition: on-failure
    max_attempts: 3

services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    deploy:
      replicas: 1
      update_config:
        order: stop-first
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_HOST}`)"
        - "traefik.http.routers.prometheus.entrypoints=websecure"
        - "traefik.http.routers.prometheus.service=prometheus"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

        # ============ BASIC AUTH =======================
        - "traefik.http.middlewares.prometheus-auth.basicauth.users=${PROMETHEUS_AUTH_USERS}"
        - "traefik.http.routers.prometheus.middlewares=prometheus-auth@swarm"
    user: "0"
    volumes:
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - monitoring
      - traefik_swarm

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG}
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "${GF_USERS_ALLOW_SIGN_UP}"
    deploy:
      <<: *deploy-common
      placement:
        constraints:
          - node.role == manager
          - node.labels.kind == prod
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST}`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.service=grafana"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_ini
        target: /etc/grafana/grafana.ini
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/prometheus.yml
      - source: grafana_dashboards
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - monitoring
      - traefik_swarm

  node-exporter:
    image: prom/node-exporter:v1.8.1
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    deploy:
      mode: global
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
      labels:
        prometheus-scrape: "true"
        prometheus-app: node-exporter
        prometheus-env: monitoring
        prometheus-metrics-port: "9100"
        prometheus-scrape-profile: important
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    command:
      - "--docker_only"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    deploy:
      mode: global
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      labels:
        prometheus-scrape: "true"
        prometheus-app: cadvisor
        prometheus-env: monitoring
        prometheus-metrics-port: "8080"
        prometheus-scrape-profile: important
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

configs:
  prometheus_config:
    external: true
    name: ${PROMETHEUS_CONFIG_NAME}
  grafana_ini:
    external: true
    name: ${GRAFANA_INI_CONFIG_NAME}
  grafana_datasources:
    external: true
    name: ${GRAFANA_DATASOURCES_CONFIG_NAME}
  grafana_dashboards:
    external: true
    name: ${GRAFANA_DASHBOARDS_CONFIG_NAME}

networks:
  traefik_swarm:
    external: true
  monitoring:
    external: true
