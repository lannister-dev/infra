version: "3.9"

# ======= deploy services ========
x-deploy-common: &deploy-common
  replicas: 1
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first
    failure_action: rollback
  restart_policy:
    condition: on-failure
    max_attempts: 3

services:
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    deploy:
      replicas: 1
      update_config:
        order: stop-first
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
    user: "0"
    volumes:
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: prometheus_config__V1_3
        target: /etc/prometheus/prometheus.yml
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - monitoring
      - traefik_proxy

  grafana:
    image: grafana/grafana:latest
    env_file:
      - ../../.env.infra
    deploy:
      <<: *deploy-common
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.lannister-dev.ru`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.service=grafana"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_ini__V1_0
        target: /etc/grafana/grafana.ini
      - source: grafana_datasources__V1_1
        target: /etc/grafana/provisioning/datasources/prometheus.yml
      - source: grafana_dashboards__V1_0
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - monitoring
      - traefik_proxy

  node-exporter:
    image: prom/node-exporter:v1.8.1
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    deploy:
      mode: global
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
      labels:
        prometheus-scrape: "true"
        prometheus-app: node-exporter
        prometheus-env: monitoring
        prometheus-metrics-port: "9100"
        prometheus-scrape-profile: important
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    command:
      - "--docker_only"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    deploy:
      mode: global
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      labels:
        prometheus-scrape: "true"
        prometheus-app: cadvisor
        prometheus-env: monitoring
        prometheus-metrics-port: "8080"
        prometheus-scrape-profile: important
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

configs:
  prometheus_config__V1_3:
    external: true
  grafana_ini__V1_0:
    external: true
  grafana_datasources__V1_1:
    external: true
  grafana_dashboards__V1_0:
    external: true

networks:
  traefik_proxy:
    external: true
    name: traefik_swarm
  monitoring:
    external: true