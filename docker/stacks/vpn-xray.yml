version: "3.9"

x-healthcheck-common: &healthcheck-common
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

x-deploy-common: &deploy-common
  mode: global
  placement:
    constraints:
      - node.labels.role == vpn
      - node.labels.channel != dev
  update_config:
    order: start-first
    failure_action: rollback
  rollback_config:
    order: start-first
  restart_policy:
    condition: on-failure


services:
  xray:
    image: ghcr.io/xtls/xray-core:latest
    networks:
      - traefik_swarm
      - vpn-net
    configs:
      - source: xray_config__V3_1
        target: /etc/xray/config.json
        mode: 0444
    command: ["run", "-config", "/etc/xray/config.json"]
    healthcheck:
      <<: *healthcheck-common
      test: ["CMD", "xray", "api", "statsquery", "--server=127.0.0.1:10085"]
    deploy:
      <<: *deploy-common
      labels:
        - traefik.enable=true

        # ===== WS =====
        - traefik.http.routers.vpn-ws.rule=Host(`prod.lannister-dev.ru`) && PathPrefix(`/api/v1/stream`)
        - traefik.http.routers.vpn-ws.entrypoints=websecure
        - traefik.http.routers.vpn-ws.tls=true
        - traefik.http.routers.vpn-ws.tls.certresolver=cf
        - traefik.http.routers.vpn-ws.priority=200
        - traefik.http.routers.vpn-ws.service=vpn-ws
        - traefik.http.services.vpn-ws.loadbalancer.server.port=10000

        # ===== XHTTP =====
        - traefik.http.routers.vpn-xhttp.rule=Host(`prod.lannister-dev.ru`) && PathPrefix(`/api/v1/mobile`)
        - traefik.http.routers.vpn-xhttp.entrypoints=websecure
        - traefik.http.routers.vpn-xhttp.tls=true
        - traefik.http.routers.vpn-xhttp.tls.certresolver=cf
        - traefik.http.routers.vpn-xhttp.priority=190
        - traefik.http.routers.vpn-xhttp.service=vpn-xhttp
        - traefik.http.services.vpn-xhttp.loadbalancer.server.port=10001

  node-agent:
    image: harbor.lannister-dev.ru/vpn-service/node-agent:prod
    # NOTE: docker stack deploy performs variable interpolation; escape $ as $$ to pass through.
    command: ["sh", "-lc", "export AGENT_CONTROL_API_TOKEN=\"$$(cat /run/secrets/bootstrap_token)\"; exec python -m app"]
    networks:
      - vpn-net
      - monitoring
    secrets:
      - bootstrap_token
    volumes:
      - agent-data:/data
    env_file:
      - ../../node-agent.env
    healthcheck:
      <<: *healthcheck-common
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/healthz', timeout=2).read(); print('ok')"]
    deploy:
      <<: *deploy-common

  vpn-fallback:
    image: nginx:alpine
    networks:
      - traefik_swarm
    configs:
      - source: vpn_fallback_index__V1_1
        target: /usr/share/nginx/html/index.html
        mode: 0444
      - source: vpn_fallback_nginx_conf__V1_1
        target: /etc/nginx/conf.d/default.conf
        mode: 0444
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.vpn-fallback.rule=Host(`tech.lannister-dev.ru`)
        - traefik.http.routers.vpn-fallback.entrypoints=websecure
        - traefik.http.routers.vpn-fallback.tls=true
        - traefik.http.routers.vpn-fallback.tls.certresolver=cf
        - traefik.http.routers.vpn-fallback.priority=1
        - traefik.http.routers.vpn-fallback.service=vpn-fallback
        - traefik.http.services.vpn-fallback.loadbalancer.server.port=80

configs:
  xray_config__V3_1:
    external: true
  vpn_fallback_index__V1_1:
    external: true
  vpn_fallback_nginx_conf__V1_1:
    external: true

volumes:
  agent-data:

secrets:
  bootstrap_token:
    external: true

networks:
  monitoring:
    external: true
  traefik_swarm:
    external: true
  vpn-net:
    external: true
