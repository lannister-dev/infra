---
x-healthcheck-common: &healthcheck-common
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

x-deploy-common: &deploy-common
  mode: global
  placement:
    constraints:
      - node.labels.role == vpn
      - node.labels.channel != dev
      - node.labels.traffic_role == standard
  update_config:
    order: stop-first
    monitor: 2m
    failure_action: rollback
  rollback_config:
    order: stop-first
    monitor: 2m
  restart_policy:
    condition: any


services:
  xray:
    image: ghcr.io/xtls/xray-core:${XRAY_IMAGE_TAG}
    ports:
      - target: 10002
        published: 443
        protocol: tcp
        mode: host
      - target: 10085
        published: 10085
        protocol: tcp
        mode: host
    networks:
      - traefik_swarm
      - vpn-net
    configs:
      - source: xray_config
        target: /etc/xray/config.json
        mode: 292
    command: ["run", "-config", "/etc/xray/config.json"]
    logging:
      driver: json-file
      options:
        max-size: "32m"
        max-file: "8"
    healthcheck:
      <<: *healthcheck-common
      test: ["CMD", "xray", "api", "statsquery", "--server=127.0.0.1:10085"]
    deploy:
      <<: *deploy-common
      labels:
        - traefik.enable=true

        # ===== WS ======
        - traefik.http.routers.vpn-ws.rule=Host(`${VPN_DOMAIN}`) && PathPrefix(`${VPN_WS_PATH}`)
        - traefik.http.routers.vpn-ws.entrypoints=websecure
        - traefik.http.routers.vpn-ws.tls=true
        - traefik.http.routers.vpn-ws.tls.certresolver=cf
        - traefik.http.routers.vpn-ws.priority=200
        - traefik.http.routers.vpn-ws.service=vpn-ws
        - traefik.http.services.vpn-ws.loadbalancer.server.port=10000

        # ===== XHTTP =====
        - traefik.http.routers.vpn-xhttp.rule=Host(`${VPN_DOMAIN}`) && PathPrefix(`${VPN_XHTTP_PATH}`)
        - traefik.http.routers.vpn-xhttp.entrypoints=websecure
        - traefik.http.routers.vpn-xhttp.tls=true
        - traefik.http.routers.vpn-xhttp.tls.certresolver=cf
        - traefik.http.routers.vpn-xhttp.priority=190
        - traefik.http.routers.vpn-xhttp.service=vpn-xhttp
        - traefik.http.services.vpn-xhttp.loadbalancer.server.port=10001

  vpn-fallback:
    image: nginx:${NGINX_ALPINE_IMAGE_TAG}
    networks:
      - traefik_swarm
    configs:
      - source: vpn_fallback_index
        target: /usr/share/nginx/html/index.html
        mode: 292
      - source: vpn_fallback_nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 292
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.vpn-fallback.rule=Host(`${VPN_FALLBACK_DOMAIN}`)
        - traefik.http.routers.vpn-fallback.entrypoints=websecure
        - traefik.http.routers.vpn-fallback.tls=true
        - traefik.http.routers.vpn-fallback.tls.certresolver=cf
        - traefik.http.routers.vpn-fallback.priority=1
        - traefik.http.routers.vpn-fallback.service=vpn-fallback
        - traefik.http.services.vpn-fallback.loadbalancer.server.port=80

configs:
  xray_config:
    external: true
    name: ${XRAY_CONFIG_NAME}
  vpn_fallback_index:
    external: true
    name: ${VPN_FALLBACK_INDEX_CONFIG_NAME}
  vpn_fallback_nginx_conf:
    external: true
    name: ${VPN_FALLBACK_NGINX_CONFIG_NAME}

networks:
  traefik_swarm:
    external: true
  vpn-net:
    external: true
