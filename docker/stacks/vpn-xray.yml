version: "3.9"

services:
  xray:
    image: ghcr.io/xtls/xray-core:latest
    networks:
      - traefik_swarm
    configs:
      - source: xray_config__V1_2
        target: /etc/xray/config.json
        mode: 0444
    command: ["run", "-config", "/etc/xray/config.json"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == vpn
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true

        # VPN WebSocket router
        - traefik.http.routers.vpn.rule=Host(`vpn.lannister-dev.ru`) && PathPrefix(`/api/v1/stream`)
        - traefik.http.routers.vpn.entrypoints=websecure
        - traefik.http.routers.vpn.tls=true
        - traefik.http.routers.vpn.priority=100

        # Service → Xray
        - traefik.http.services.vpn.loadbalancer.server.port=10000

  vpn-fallback:
    image: nginx:alpine
    networks:
      - traefik_swarm
    configs:
      - source: vpn_fallback_index__V1_1
        target: /usr/share/nginx/html/index.html
        mode: 0444
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true

        # Fallback router
        - traefik.http.routers.vpn-fallback.rule=Host(`vpn.lannister-dev.ru`)
        - traefik.http.routers.vpn-fallback.entrypoints=websecure
        - traefik.http.routers.vpn-fallback.tls=true
        - traefik.http.routers.vpn-fallback.priority=1

        - traefik.http.services.vpn-fallback.loadbalancer.server.port=80
configs:
  vpn_fallback_index__V1_1:
    external: True
  xray_config__V1_2:
    external: true
networks:
  traefik_swarm:
    external: true