version: "3.9"

services:
  xray:
    image: ghcr.io/xtls/xray-core:latest
    networks:
      - traefik_swarm
    configs:
      - source: xray_config__V1_8
        target: /etc/xray/config.json
        mode: 0444
    command: ["run", "-config", "/etc/xray/config.json"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == vpn
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true

        # ================= WS (Wi-Fi) =================
        - traefik.http.routers.vpn-ws.rule=Host(`vpn.lannister-dev.ru`) && PathPrefix(`/api/v1/stream`)
        - traefik.http.routers.vpn-ws.entrypoints=websecure
        - traefik.http.routers.vpn-ws.tls=true
        - traefik.http.routers.vpn-ws.priority=500
        - traefik.http.services.vpn-ws.loadbalancer.server.port=10000

        # ================= XHTTP (Mobile) ==============
        - traefik.http.routers.vpn-xhttp.rule=Host(`vpn.lannister-dev.ru`) && PathPrefix(`/api/v1/mobile`)
        - traefik.http.routers.vpn-xhttp.entrypoints=websecure
        - traefik.http.routers.vpn-xhttp.tls=true
        - traefik.http.routers.vpn-xhttp.priority=490
        - traefik.http.services.vpn-xhttp.loadbalancer.server.port=10001

  vpn-fallback:
    image: nginx:alpine
    networks:
      - traefik_swarm
    configs:
      - source: vpn_fallback_index__V1_1
        target: /usr/share/nginx/html/index.html
        mode: 0444
      - source: vpn_fallback_nginx_conf__V1_1
        target: /etc/nginx/conf.d/default.conf
        mode: 0444
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.vpn-fallback.rule=Host(`vpn.lannister-dev.ru`) && !PathPrefix(`/api/v1/`)
        - traefik.http.routers.vpn-fallback.entrypoints=websecure
        - traefik.http.routers.vpn-fallback.tls=true
        - traefik.http.routers.vpn-fallback.priority=1
        - traefik.http.services.vpn-fallback.loadbalancer.server.port=80
configs:
  xray_config__V1_8:
    external: true
  vpn_fallback_index__V1_1:
    external: True
  vpn_fallback_nginx_conf__V1_1:
    external: True
networks:
  traefik_swarm:
    external: true