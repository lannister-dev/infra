---
services:
  nats:
    image: nats:${NATS_IMAGE_TAG}
    command:
      - /bin/sh
      - -ec
      - >-
        exec nats-server
        --jetstream
        --js_max_store=512MB
        --js_max_mem=128MB
        --store_dir=/data
        --http_port=8222
        --server_name=nats
        --auth "$$(cat /run/secrets/nats_auth_token)"
    volumes:
      - nats_data:/data
    secrets:
      - nats_auth_token
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.kind == dev
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.nats-monitor.rule=Host(`${NATS_MONITOR_HOST}`)"
        - "traefik.http.routers.nats-monitor.entrypoints=websecure"
        - "traefik.http.routers.nats-monitor.tls=true"
        - "traefik.http.routers.nats-monitor.tls.certresolver=cf"
        - "traefik.http.routers.nats-monitor.service=nats-monitor"
        - "traefik.http.routers.nats-monitor.middlewares=nats-auth@swarm"
        - "traefik.http.services.nats-monitor.loadbalancer.server.port=8222"
        - "traefik.http.middlewares.nats-auth.basicauth.users=${NATS_MONITOR_AUTH_USERS}"
        # TCP client endpoint (node-agent/control-plane)
        - "traefik.tcp.routers.nats-client.rule=HostSNI(`*`)"
        - "traefik.tcp.routers.nats-client.entrypoints=nats"
        - "traefik.tcp.routers.nats-client.service=nats-client-svc"
        - "traefik.tcp.services.nats-client-svc.loadbalancer.server.port=4222"
    networks:
      vpn-net:
        aliases:
          - nats
      vpn-dev-net:
        aliases:
          - nats
      monitoring:
      traefik_swarm:

  nats-exporter:
    image: natsio/prometheus-nats-exporter:${NATS_EXPORTER_IMAGE_TAG}
    command:
      - "-varz"
      - "-connz"
      - "-routez"
      - "-subz"
      - "-jsz=all"
      - "http://nats:8222"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.kind == dev
      restart_policy:
        condition: any
      labels:
        - "prometheus-scrape=true"
        - "prometheus-app=nats"
        - "prometheus-env=dev"
        - "prometheus-metrics-port=7777"
        - "prometheus-metrics-path=/metrics"
        - "prometheus-scrape-profile=important"
    networks:
      - monitoring

volumes:
  nats_data:
    driver: local

networks:
  monitoring:
    external: true
  vpn-net:
    external: true
  vpn-dev-net:
    external: true
    name: ${VPN_DEV_NETWORK_NAME:-vpn-dev-net}
  traefik_swarm:
    external: true

secrets:
  nats_auth_token:
    external: true
