# ============================================================
# profiles.yml — Single source of truth for VPN profiles
# ============================================================
# Used by:
#   1. generate_xray_config.py  → xray server config (inbounds)
#   2. generate_profiles_artifact.py → control-plane artifact (client params)
#
# Server-only fields (private_key, dest, listen_port) are stripped
# from the artifact and never reach clients.
# ============================================================

ws_tls_v1:
  type: ws_tls
  display_name: "CDN WS TLS"

  # Client params (go to artifact → VLESS URI)
  path: /api/v1/stream
  host: tech.lannister-dev.ru
  sni: tech.lannister-dev.ru

  # Server params (xray inbound only)
  listen_port: 443
  certificates:
    cert_file: /etc/xray/certs/fullchain.pem
    key_file: /etc/xray/certs/privkey.pem


reality_tcp_v1:
  type: reality_tcp
  display_name: "Reality TCP"

  # Client params (go to artifact → VLESS URI)
  sni: www.cloudflare.com
  flow: xtls-rprx-vision
  fingerprint: chrome
  public_key: "YOUR_REALITY_PUBLIC_KEY"
  short_id: "abcd1234"

  # Server params (xray inbound only)
  listen_port: 8443
  private_key: "YOUR_REALITY_PRIVATE_KEY"
  dest: "www.cloudflare.com:443"
  server_names:
    - www.cloudflare.com
  short_ids:
    - "abcd1234"
