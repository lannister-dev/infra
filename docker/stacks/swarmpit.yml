version: "3.9"

services:
  swarmpit:
    image: swarmpit/swarmpit:latest
    environment:
      - SWARMPIT_DB=http://couchdb:5984
    networks:
      - traefik_swarm
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.swarmpit.rule=Host(`swarmpit.lannister-dev.ru`)"
        - "traefik.http.routers.swarmpit.entrypoints=websecure"
        - "traefik.http.routers.swarmpit.tls=true"
        - "traefik.http.services.swarmpit.loadbalancer.server.port=8080"

  agent:
    image: swarmpit/agent:latest
    environment:
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik_swarm
    deploy:
      mode: global

  couchdb:
    image: couchdb:2.3
    volumes:
      - swarmpit_db:/opt/couchdb/data
    networks:
      - traefik_swarm

networks:
  traefik_swarm:
    external: true

volumes:
  swarmpit_db: