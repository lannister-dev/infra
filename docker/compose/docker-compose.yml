services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - traefik_proxy

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    env_file:
      - ../../.env.infra
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.lannister-dev.ru`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.service=grafana"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    networks:
      - traefik_proxy
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    env_file:
      - ../../.env.infra
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/tls.yaml:/etc/traefik/tls.yaml
      - ./traefik/acme:/acme
    command:
      # ENTRYPOINTS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.websecure.http.tls.certresolver=cf"

      # PROVIDERS
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik_proxy"
      - "--providers.file.filename=/etc/traefik/tls.yaml"

      # API / DASHBOARD
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # ACME (DNS-01)
      - "--certificatesresolvers.cf.acme.email=degterev907@gmail.com"
      - "--certificatesresolvers.cf.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.cf.acme.dnschallenge.provider=cloudflare"

      # METRICS
      - "--metrics.prometheus=true"

      # LOGGING
      - "--accesslog=true"
      - "--log.level=INFO"
    labels:
      - "traefik.enable=true"

      # ============ TRAEFIK DASHBOARD ================
      - "traefik.http.routers.traefik.rule=Host(`traefik.lannister-dev.ru`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.service=traefik"
      - "traefik.http.routers.traefik.service=api@internal"

      # ============ BASIC AUTH =======================
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      - "traefik.http.routers.traefik.middlewares=traefik-auth@docker"
    networks:
      - traefik_proxy

volumes:
  prometheus_data:
  grafana_data:
networks:
  traefik_proxy:
    name: traefik_proxy
    external: true