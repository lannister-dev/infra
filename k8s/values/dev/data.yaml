# data chart values — dev (namespace: data-dev)
#
# Install:
#   helm upgrade --install data-dev charts/data \
#     -n data-dev --create-namespace \
#     -f values/dev/data.yaml
#
# Secrets (create before install):
#   kubectl create secret generic data-dev-postgres -n data-dev --from-literal=password=<password>
#   kubectl create secret generic data-dev-redis -n data-dev --from-literal=password=<password>

postgres:
  image:
    tag: "16-alpine"
  database: vpn_control_dev
  user: vpn_dev_user
  existingSecret: data-dev-postgres
  storage:
    size: 5Gi
    storageClassName: local-path
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 25m
      memory: 64Mi

  backup:
    enabled: true
    schedule: "0 4 * * *"
    retention: 3

redis:
  image:
    tag: "7-alpine"
  existingSecret: data-dev-redis
  storage:
    size: 2Gi
    storageClassName: local-path
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 32Mi
