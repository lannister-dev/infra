# vpn-xray chart values — production
#
# Install:
#   helm upgrade --install vpn-xray charts/vpn-xray \
#     -n vpn-prod --create-namespace \
#     -f values/prod/vpn-xray.yaml

image:
  tag: "latest"

nodeSelector:
  role: vpn
  channel: prod

tolerations:
  - key: dedicated
    value: vpn
    effect: NoSchedule

hostNetwork: true

config:
  json: |
    {
      "log": { "loglevel": "info" },
      "api": {
        "services": ["HandlerService", "StatsService"],
        "tag": "api"
      },
      "stats": {},
      "policy": {
        "levels": {
          "0": {
            "statsUserUplink": true,
            "statsUserDownlink": true
          }
        },
        "system": {
          "statsInboundUplink": true,
          "statsInboundDownlink": true
        }
      },
      "inbounds": [
        {
          "tag": "api",
          "listen": "0.0.0.0",
          "port": 10085,
          "protocol": "dokodemo-door",
          "settings": { "address": "127.0.0.1" }
        },
        {
          "tag": "vless-ws",
          "listen": "0.0.0.0",
          "port": 10000,
          "protocol": "vless",
          "settings": { "clients": [], "decryption": "none" },
          "streamSettings": {
            "network": "ws",
            "security": "none",
            "wsSettings": {
              "path": "/api/v1/stream",
              "headers": { "Host": "tech.apirelay.org" }
            }
          },
          "sniffing": { "enabled": true, "destOverride": ["http", "tls", "quic"] }
        },
        {
          "tag": "vless-xhttp",
          "listen": "0.0.0.0",
          "port": 10001,
          "protocol": "vless",
          "settings": { "clients": [], "decryption": "none" },
          "streamSettings": {
            "network": "xhttp",
            "security": "none",
            "xhttpSettings": { "path": "/api/v1/mobile", "mode": "auto" }
          },
          "sniffing": { "enabled": true, "destOverride": ["http", "tls", "quic"] }
        },
        {
          "tag": "vless-reality",
          "listen": "0.0.0.0",
          "port": 443,
          "protocol": "vless",
          "settings": { "clients": [], "decryption": "none" },
          "streamSettings": {
            "network": "tcp",
            "security": "reality",
            "realitySettings": {
              "show": false,
              "dest": "127.0.0.1:10443",
              "xver": 0,
              "serverNames": ["www.cloudflare.com"],
              "privateKey": "2JcSaVDfb3caMQ3-XaNEqfzcHBFLlQ4zmiLcfD0sp2o",
              "minClientVer": "",
              "maxClientVer": "",
              "maxTimeDiff": 0,
              "shortIds": ["6c1ec52d8fabfd86"]
            }
          },
          "sniffing": { "enabled": true, "destOverride": ["http", "tls", "quic"] }
        },
        {
          "tag": "reality-dokodemo",
          "listen": "127.0.0.1",
          "port": 10443,
          "protocol": "dokodemo-door",
          "settings": { "address": "www.cloudflare.com", "port": 443, "network": "tcp" },
          "sniffing": { "enabled": true, "routeOnly": true, "destOverride": ["http", "tls"] }
        }
      ],
      "routing": {
        "rules": [
          { "type": "field", "inboundTag": ["api"], "outboundTag": "api" },
          { "type": "field", "inboundTag": ["reality-dokodemo"], "domain": ["full:www.cloudflare.com"], "outboundTag": "freedom" },
          { "type": "field", "inboundTag": ["reality-dokodemo"], "outboundTag": "block" }
        ]
      },
      "outbounds": [
        { "tag": "freedom", "protocol": "freedom", "settings": { "domainStrategy": "UseIPv4" } },
        { "tag": "block", "protocol": "blackhole" }
      ]
    }

vpn:
  wsPath: /api/v1/stream
  xhttpPath: /api/v1/mobile

fallback:
  enabled: true

nodeAgent:
  bootstrapToken: ""
  secretName: node-agent-prod-bootstrap
