# NATS official Helm chart values — production
#
# Install:
#   helm repo add nats https://nats-io.github.io/k8s/helm/charts/
#   helm upgrade --install nats nats/nats \
#     -n nats --create-namespace \
#     -f values/prod/nats.yaml
#
# Secrets (create before install):
#   kubectl create secret generic nats-auth -n nats --from-literal=token=<token>

config:
  jetstream:
    enabled: true
    fileStore:
      enabled: true
      pvc:
        size: 5Gi
        storageClassName: local-path
      maxSize: 512Mi
    memoryStore:
      enabled: true
      maxSize: 128Mi

  merge:
    authorization:
      token: $NATS_AUTH_TOKEN

container:
  image:
    tag: 2.11-alpine
  env:
    NATS_AUTH_TOKEN:
      valueFrom:
        secretKeyRef:
          name: nats-auth
          key: token
  merge:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

promExporter:
  enabled: true
  image:
    repository: natsio/prometheus-nats-exporter
    tag: "0.19.1"
  port: 7777
