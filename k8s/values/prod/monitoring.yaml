# kube-prometheus-stack values — production
#
# Replaces: prometheus, grafana, alertmanager, node-exporter, cadvisor
# Swarm docker_sd_configs → K8s native service discovery (automatic)
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f k8s/values/prod/monitoring.yaml

# ── Prometheus ─────────────────────────────────────────────
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 14d
    scrapeInterval: 15s
    evaluationInterval: 15s
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 512Mi
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.lannister-dev.ru
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      # Basic auth via middleware (optional)
      # traefik.ingress.kubernetes.io/router.middlewares: monitoring-basic-auth@kubernetescrd

# ── Grafana ────────────────────────────────────────────────
grafana:
  adminUser: admin
  # Use existing K8s Secret for admin password:
  #   kubectl create secret generic grafana-admin -n monitoring --from-literal=admin-password=<password>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  grafana.ini:
    server:
      domain: grafana.lannister-dev.ru
      root_url: "https://%(domain)s/"
  persistence:
    enabled: true
    existingClaim: monitoring-grafana
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.lannister-dev.ru
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# ── Alertmanager ───────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
  # Alertmanager config — migrated from monitoring/alertmanager/alertmanager.yml
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: [alertname, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: default
          group_wait: 10s
          repeat_interval: 1h
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: [alertname, service]
    receivers:
      - name: default
        webhook_configs:
          - url: "http://placeholder:5001/alert"  # ← заменить на реальный webhook
            send_resolved: true
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - alertmanager.lannister-dev.ru
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"

# ── Node Exporter ──────────────────────────────────────────
nodeExporter:
  enabled: true
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

kubelet:
  enabled: true
  serviceMonitor:
    https: true
    cAdvisor: true
    probes: true

# ── kube-state-metrics ─────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ── Custom Alert Rules ─────────────────────────────────────
# Migrated from monitoring/prometheus/rules/alerts.yml
# Swarm-specific rules (ServiceDown with swarm_service_*) are removed.
# K8s equivalents are included in kube-prometheus-stack by default.
additionalPrometheusRulesMap:
  custom-infra-rules:
    groups:
      - name: infrastructure
        rules:
          - alert: NodeDown
            expr: up{job=~".*node-exporter.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node exporter down on {{ $labels.instance }}"
              description: "Node exporter has been unreachable for more than 2 minutes."

          - alert: HighCpuUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage has been above 85% for more than 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

          - alert: HighMemoryUsage
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Memory usage has been above 85% for more than 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

          - alert: HighDiskUsage
            expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 > 85
            labels:
              severity: warning
            annotations:
              summary: "High disk usage on {{ $labels.instance }} ({{ $labels.mountpoint }})"
              description: "Disk usage is above 85% (current: {{ $value | printf \"%.1f\" }}%)."

      - name: services
        rules:
          # Replaces Swarm ServiceDown — detects K8s pods not ready
          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="true"} == 0
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
              description: "Pod has been not ready for more than 3 minutes."

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_ready_replicas
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
              description: "Desired replicas != ready replicas for more than 5 minutes."

          - alert: ContainerRestarting
            expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} restarting"
              description: "Container has restarted more than 3 times in the last 10 minutes."

          - alert: CertificateExpiringSoon
            expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 7
            labels:
              severity: warning
            annotations:
              summary: "TLS certificate expiring soon on {{ $labels.instance }}"
              description: "Certificate expires in less than 7 days ({{ $value | printf \"%.0f\" }} days remaining)."

          - alert: PrometheusTargetDown
            expr: up == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus target {{ $labels.instance }} is down"
              description: "Target has been unreachable for more than 5 minutes."

      - name: vpn
        rules:
          - alert: EntryProxyEmpty
            expr: agent_entry_users == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Entry node {{ $labels.pod }} has 0 users loaded"
              description: "agent_entry_users has been 0 for more than 5 minutes — the entry proxy never received/applied a snapshot, so it resets every client. Restart the pod or check snapshot delivery."
