# data chart values — production (namespace: data-prod)
#
# Install:
#   helm upgrade --install data-prod charts/data \
#     -n data-prod --create-namespace \
#     -f values/prod/data.yaml
#
# Secrets (create before install):
#   kubectl create secret generic data-prod-postgres -n data-prod --from-literal=password=<password>
#   kubectl create secret generic data-prod-redis -n data-prod --from-literal=password=<password>

nodeSelector:
  kind: prod

postgres:
  # Disabled: prod migrated to CNPG (pg-prod-rw). Legacy single-instance postgres removed 2026-06-29.
  enabled: false
  image:
    tag: "16-alpine"
  database: vpn_control
  user: vpn_prod_user
  existingSecret: data-prod-postgres
  storage:
    size: 20Gi
    storageClassName: local-path
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  backup:
    enabled: true
    schedule: "0 3 * * *"
    retention: 7
    storage:
      size: 10Gi

redis:
  image:
    tag: "7-alpine"
  existingSecret: data-prod-redis
  storage:
    size: 5Gi
    storageClassName: local-path
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 25m
      memory: 64Mi
