# External Secrets Operator — production values
#
# Installed via ArgoCD from remote Helm chart:
#   https://charts.external-secrets.io

installCRDs: true

replicaCount: 1

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

webhook:
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

certController:
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi
