# External Secrets Operator — production values
#
# Installed via ArgoCD from remote Helm chart:
#   https://charts.external-secrets.io

installCRDs: true

replicaCount: 1

# Pinned to SPb node — image oci.external-secrets.io does not pull from Moscow nodes (infra-04/05)
nodeSelector:
  kubernetes.io/hostname: 2669415-um55169.twc1.net

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

webhook:
  nodeSelector:
    kubernetes.io/hostname: 2669415-um55169.twc1.net
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

certController:
  nodeSelector:
    kubernetes.io/hostname: 2669415-um55169.twc1.net
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi
