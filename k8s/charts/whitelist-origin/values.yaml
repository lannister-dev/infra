image:
  repository: nginx
  tag: "1.27.5-alpine"
  pullPolicy: IfNotPresent

replicas: 1

# Schedule onto the whitelist entry node and share its host network so :80
# (CDN origin) and 127.0.0.1:<doorman.port> (the local doorman) are reachable.
nodeSelector:
  role: vpn
  channel: prod
  traffic_role: whitelist_entry

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

# Local doorman (xray dokodemo+xhttp) port that nginx forwards /v1/edge to.
# Must match go-node-agent values.whitelist-prod.yaml doorman.hostPort.
doorman:
  port: 8088

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 96Mi
