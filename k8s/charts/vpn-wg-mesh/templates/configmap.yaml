apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-bootstrap
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}
data:
  bootstrap-keys.sh: |
    #!/bin/sh
    set -eu
    KEY_DIR="/keys"
    PRIV="$KEY_DIR/private.key"
    PUB="$KEY_DIR/public.key"
    mkdir -p "$KEY_DIR"
    chmod 700 "$KEY_DIR"
    if [ ! -s "$PRIV" ]; then
      umask 077
      wg genkey > "$PRIV"
    fi
    wg pubkey < "$PRIV" > "$PUB"
    echo "wg_public_key=$(cat "$PUB")"

  bootstrap-stub-config.sh: |
    #!/bin/sh
    set -eu
    CFG="$1"
    LISTEN_PORT="${2:-51820}"
    PRIV_KEY="$(cat /keys/private.key)"
    if [ -z "$PRIV_KEY" ]; then
      echo "private.key is empty — keygen must run first" >&2
      exit 1
    fi
    if [ -s "$CFG" ] && grep -q "^PrivateKey = $PRIV_KEY$" "$CFG"; then
      exit 0
    fi
    umask 077
    cat > "$CFG" <<EOF
    [Interface]
    PrivateKey = $PRIV_KEY
    ListenPort = $LISTEN_PORT
    EOF
