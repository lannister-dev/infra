apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      hostNetwork: true
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      initContainers:
        - name: keygen
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["/bin/sh", "/scripts/bootstrap-keys.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: keys
              mountPath: /keys
        - name: stub-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/sh
            - /scripts/bootstrap-stub-config.sh
            - /config/{{ .Values.configFileName }}
            - {{ .Values.listenPort | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: config
              mountPath: /config
            - name: keys
              mountPath: /keys
              readOnly: true
      containers:
        - name: wg
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - sh
            - -c
            - |
              CFG=/config/{{ .Values.configFileName }}
              IFACE=$(basename "$CFG" .conf)

              # ensure_address sets the Address from CFG on IFACE if missing.
              # `wg syncconf` does NOT re-apply Address — if the interface
              # was created earlier without it, packets to wg-mesh peer IPs
              # would route via the default gateway and dial would time out.
              ensure_address() {
                local addr=$(awk -F'= *' '/^Address/{print $2; exit}' "$CFG")
                [ -z "$addr" ] && return
                # AddrLine may be a comma-separated list; iterate.
                local IFS=,
                for a in $addr; do
                  a=$(echo "$a" | tr -d ' ')
                  ip addr show "$IFACE" 2>/dev/null | grep -qw "$a" || \
                    ip addr add "$a" dev "$IFACE" 2>/dev/null || true
                done
              }

              # ensure_routes adds /32 routes for every peer's AllowedIPs to IFACE.
              # wg-quick adds these but `wg syncconf` does not; pod restart that
              # falls back to syncconf-only would leave kernel routing peer
              # IPs via the default gateway.
              ensure_routes() {
                wg show "$IFACE" allowed-ips 2>/dev/null | while read _ ips; do
                  for ip in $ips; do
                    [ -z "$ip" ] && continue
                    [ "$ip" = "(none)" ] && continue
                    ip route show "$ip" dev "$IFACE" >/dev/null 2>&1 || \
                      ip route add "$ip" dev "$IFACE" scope link 2>/dev/null || true
                  done
                done
              }

              wg-quick down "$CFG" 2>/dev/null || true
              wg-quick up "$CFG"
              ensure_address
              ensure_routes
              last_hash=$(sha256sum "$CFG" | awk '{print $1}')
              while true; do
                sleep {{ .Values.peerSyncIntervalSec | default 15 }}
                cur_hash=$(sha256sum "$CFG" 2>/dev/null | awk '{print $1}')
                if [ -n "$cur_hash" ] && [ "$cur_hash" != "$last_hash" ]; then
                  if wg syncconf "$IFACE" <(wg-quick strip "$CFG") 2>&1; then
                    echo "[wg-mesh] applied syncconf (hash $last_hash -> $cur_hash)"
                    last_hash="$cur_hash"
                    ensure_address
                    ensure_routes
                  else
                    echo "[wg-mesh] syncconf failed, retrying"
                  fi
                else
                  # cheap drift guard: even without config change, re-assert
                  # Address & routes in case external actor flushed the iface
                  ensure_address
                  ensure_routes
                fi
              done
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "wg-quick down /config/{{ .Values.configFileName }} || true"]
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
          ports:
            - name: wg
              containerPort: {{ .Values.listenPort }}
              hostPort: {{ .Values.listenPort }}
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: keys
              mountPath: /keys
              readOnly: true
            - name: kernel-modules
              mountPath: /lib/modules
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["wg", "show", "wg0"]
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: {{ .Release.Name }}-bootstrap
            defaultMode: 0755
        - name: keys
          hostPath:
            path: {{ .Values.keysHostPath | quote }}
            type: DirectoryOrCreate
        - name: config
          hostPath:
            path: {{ .Values.configHostPath | quote }}
            type: DirectoryOrCreate
        - name: kernel-modules
          hostPath:
            path: /lib/modules
            type: Directory
