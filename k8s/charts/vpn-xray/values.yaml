# vpn-xray: Xray-core VPN proxy
# Deploys as DaemonSet on nodes with label role=vpn

image:
  repository: ghcr.io/xtls/xray-core
  tag: "latest"
  pullPolicy: IfNotPresent

# Node selection — only VPN nodes
nodeSelector:
  role: vpn
  channel: prod

# Tolerations for dedicated VPN nodes
tolerations:
  - key: dedicated
    value: vpn
    effect: NoSchedule

# Xray listens on host ports
hostNetwork: false
ports:
  tls:
    containerPort: 10002
    hostPort: 443
  stats:
    containerPort: 10085
    hostPort: 10085

# Paths for Traefik Ingress routing
vpn:
  wsPath: /api/v1/stream
  xhttpPath: /api/v1/mobile

# Xray config — mounted as ConfigMap
# Set existingConfigMap to use a pre-created ConfigMap,
# or provide inline JSON via config.json
config:
  existingConfigMap: ""
  json: "{}"

# Fallback nginx (optional)
fallback:
  enabled: true
  image:
    repository: nginx
    tag: "1.27.5-alpine"
  replicas: 1

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

logging:
  maxSize: "32m"
  maxFile: "8"

wgIsolate:
  enabled: false
  image: alpine:3.20
  port: 10100
  interface: wg0

# node-agent bootstrap secret (optional)
nodeAgent:
  bootstrapToken: ""
  secretName: node-agent-prod-bootstrap
