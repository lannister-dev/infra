{{- if .Values.fallback.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-xray
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - http:
        paths:
          - path: {{ .Values.vpn.wsPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-xray
                port:
                  name: ws
          - path: {{ .Values.vpn.xhttpPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-xray
                port:
                  name: xhttp
{{- end }}
