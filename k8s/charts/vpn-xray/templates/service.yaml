apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-xray
  namespace: {{ .Release.Namespace }}
  labels:
    app: xray
spec:
  # ClusterIP for internal access (Traefik ingress)
  type: ClusterIP
  selector:
    app: xray
  ports:
    - name: ws
      port: 10000
      targetPort: 10000
      protocol: TCP
    - name: xhttp
      port: 10001
      targetPort: 10001
      protocol: TCP
      appProtocol: kubernetes.io/h2c
    - name: stats
      port: 10085
      targetPort: {{ .Values.ports.stats.containerPort }}
      protocol: TCP
