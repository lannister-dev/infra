apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-xray
  namespace: {{ .Release.Namespace }}
  labels:
    app: xray
    chart: {{ .Chart.Name }}
spec:
  selector:
    matchLabels:
      app: xray
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: xray
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: traffic_role
                    operator: NotIn
                    values: ["entry", "whitelist_entry"]
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      hostNetwork: {{ .Values.hostNetwork }}
      {{- if or .Values.wgIsolate.enabled .Values.warp.enabled }}
      initContainers:
      {{- end }}
      {{- if .Values.wgIsolate.enabled }}
        - name: wg-isolate
          image: {{ .Values.wgIsolate.image | quote }}
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache iptables >/dev/null
              PORT={{ .Values.wgIsolate.port }}
              IFACE={{ .Values.wgIsolate.interface | quote }}
              iptables -C INPUT -p tcp --dport "$PORT" -i "$IFACE" -j ACCEPT 2>/dev/null \
                || iptables -I INPUT 1 -p tcp --dport "$PORT" -i "$IFACE" -j ACCEPT
              iptables -C INPUT -p tcp --dport "$PORT" -i lo -j ACCEPT 2>/dev/null \
                || iptables -I INPUT 2 -p tcp --dport "$PORT" -i lo -j ACCEPT
              iptables -C INPUT -p tcp --dport "$PORT" -j DROP 2>/dev/null \
                || iptables -A INPUT -p tcp --dport "$PORT" -j DROP
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
      {{- end }}
      {{- if .Values.warp.enabled }}
        - name: warp-config-render
          image: {{ .Values.warp.image | quote }}
          command:
            - sh
            - -c
            - |
              set -e
              sed "s|__WARP_PRIVATE_KEY__|$WARP_PRIVATE_KEY|g" /etc/xray-tpl/config.json > /etc/xray/config.json
          env:
            - name: WARP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.warp.secretName }}
                  key: privateKey
          volumeMounts:
            - name: xray-config-tpl
              mountPath: /etc/xray-tpl
              readOnly: true
            - name: xray-config-rendered
              mountPath: /etc/xray
          resources:
            limits:
              memory: 64Mi
              cpu: 100m
      {{- end }}
      containers:
        - name: xray
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["xray", "run", "-config", "/etc/xray/config.json"]
          {{- if .Values.hostNetwork }}
          securityContext:
            runAsUser: 0
          {{- end }}
          {{- if not .Values.hostNetwork }}
          ports:
            - name: tls
              containerPort: {{ .Values.ports.tls.containerPort }}
              hostPort: {{ .Values.ports.tls.hostPort }}
              protocol: TCP
            - name: stats
              containerPort: {{ .Values.ports.stats.containerPort }}
              hostPort: {{ .Values.ports.stats.hostPort }}
              protocol: TCP
          {{- end }}
          volumeMounts:
            - name: {{ if .Values.warp.enabled }}xray-config-rendered{{ else }}xray-config{{ end }}
              mountPath: /etc/xray
              readOnly: {{ not .Values.warp.enabled }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["xray", "api", "statsquery", "--server=127.0.0.1:10085"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["xray", "api", "statsquery", "--server=127.0.0.1:10085"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: {{ if .Values.warp.enabled }}xray-config-tpl{{ else }}xray-config{{ end }}
          configMap:
            name: {{ .Values.config.existingConfigMap | default (printf "%s-xray-config" .Release.Name) }}
        {{- if .Values.warp.enabled }}
        - name: xray-config-rendered
          emptyDir: {}
        {{- end }}
