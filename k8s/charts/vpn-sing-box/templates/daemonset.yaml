apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      hostPID: false
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f {{ .Values.sharedConfigPath | quote }} ]; then
                cp /etc/sing-box-bootstrap/config.json {{ .Values.sharedConfigPath | quote }}
              fi
          volumeMounts:
            - name: bootstrap
              mountPath: /etc/sing-box-bootstrap
              readOnly: true
            - name: shared
              mountPath: {{ dir .Values.sharedConfigPath | quote }}
      containers:
        - name: sing-box
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/sing-box
            - run
            - -c
            - {{ .Values.sharedConfigPath | quote }}
          ports:
            - name: vless
              containerPort: {{ .Values.ports.vless.containerPort }}
              hostPort: {{ .Values.ports.vless.hostPort }}
              protocol: TCP
          volumeMounts:
            - name: shared
              mountPath: {{ dir .Values.sharedConfigPath | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.ports.vless.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: {{ .Values.ports.vless.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: bootstrap
          configMap:
            name: {{ .Release.Name }}-config
        - name: shared
          hostPath:
            path: {{ .Values.sharedHostPath | quote }}
            type: DirectoryOrCreate
