apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      hostPID: false
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              CFG={{ .Values.sharedConfigPath | quote }}
              if [ ! -f "$CFG" ]; then
                cp /etc/sing-box-bootstrap/config.json "$CFG"
              fi
              # allow go-node-agent (uid/gid 65532) to update the file in-place
              chgrp {{ .Values.agentGid | default 65532 }} "$(dirname "$CFG")" "$CFG"
              chmod 0775 "$(dirname "$CFG")"
              chmod 0664 "$CFG"
          volumeMounts:
            - name: bootstrap
              mountPath: /etc/sing-box-bootstrap
              readOnly: true
            - name: shared
              mountPath: {{ dir .Values.sharedConfigPath | quote }}
      containers:
        - name: sing-box
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              CONFIG={{ .Values.sharedConfigPath | quote }}
              INTERVAL=2

              checksum() {
                set -- $(sha256sum "$CONFIG")
                printf '%s' "$1"
              }

              child=""
              stop() {
                if [ -n "$child" ]; then
                  kill -TERM "$child" 2>/dev/null || true
                  wait "$child" 2>/dev/null || true
                fi
                exit 0
              }
              trap stop TERM INT

              current="$(checksum)"
              while true; do
                restart=0
                /usr/local/bin/sing-box run -c "$CONFIG" &
                child="$!"

                while kill -0 "$child" 2>/dev/null; do
                  sleep "$INTERVAL"
                  next="$(checksum)"
                  if [ "$next" != "$current" ]; then
                    echo "sing-box config changed, restarting process"
                    current="$next"
                    restart=1
                    kill -TERM "$child" 2>/dev/null || true
                    break
                  fi
                done

                wait "$child"
                status="$?"
                child=""

                if [ "$restart" = "1" ]; then
                  continue
                fi
                exit "$status"
              done
          ports:
            - name: vless
              containerPort: {{ .Values.ports.vless.containerPort }}
              hostPort: {{ .Values.ports.vless.hostPort }}
              protocol: TCP
          volumeMounts:
            - name: shared
              mountPath: {{ dir .Values.sharedConfigPath | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.ports.vless.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: {{ .Values.ports.vless.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: bootstrap
          configMap:
            name: {{ .Release.Name }}-config
        - name: shared
          hostPath:
            path: {{ .Values.sharedHostPath | quote }}
            type: DirectoryOrCreate
