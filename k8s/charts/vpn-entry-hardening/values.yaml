image:
  repository: alpine
  tag: "3.19"
  pullPolicy: IfNotPresent

nodeSelector:
  role: vpn

trafficRoles:
  - entry
  - whitelist_entry

tolerations:
  - key: dedicated
    value: vpn
    effect: NoSchedule

protectedPorts:
  - 443

connlimitMax: 50
recentHitcount: 30
recentSeconds: 60
reassertIntervalSec: 60

sysctl:
  net.ipv4.tcp_syncookies: 1
  net.ipv4.tcp_max_syn_backlog: 8192
  net.core.somaxconn: 8192
  net.ipv4.tcp_synack_retries: 2
  net.ipv4.tcp_syn_retries: 3
  net.ipv4.tcp_fin_timeout: 15
  net.ipv4.tcp_tw_reuse: 1
  net.core.netdev_max_backlog: 16384
  net.netfilter.nf_conntrack_max: 524288

resources:
  limits:
    memory: 128Mi
    cpu: 100m
  requests:
    memory: 32Mi
    cpu: 10m
