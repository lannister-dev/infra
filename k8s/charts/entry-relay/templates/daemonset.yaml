apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}
    mode: {{ .Values.mode | quote }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        mode: {{ .Values.mode | quote }}
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      initContainers:
        - name: init-shared
          image: busybox:1.36
          command:
            - sh
            - -c
            - chown 99:99 /shared && chmod 0775 /shared
          volumeMounts:
            - name: shared
              mountPath: /shared
      containers:
        - name: haproxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: tls
              containerPort: 443
              hostPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
              readOnly: true
            - name: shared
              mountPath: /shared
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
        - name: shared
          hostPath:
            path: {{ .Values.sharedHostPath | quote }}
            type: DirectoryOrCreate
