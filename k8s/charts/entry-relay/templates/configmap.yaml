apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      stats socket /shared/admin.sock mode 600 level admin expose-fd listeners
      stats timeout 30s

    defaults
      log global
      mode tcp
      option tcplog
      option clitcpka
      option srvtcpka
      timeout connect 10s
      timeout client 24h
      timeout server 24h
      timeout tunnel 24h

    frontend fe_tls
      bind :443
      default_backend be_tls

    backend be_tls
      {{- if eq .Values.mode "whitelist_entry" }}
      balance first
      option tcp-check
      default-server check inter {{ .Values.pool.checkIntervalMs }} fall {{ .Values.pool.checkFall }} rise {{ .Values.pool.checkRise }}
      server upstream {{ .Values.upstream }} check
      server-template srv {{ .Values.pool.slotCount }} 0.0.0.0:443 check backup disabled
      {{- else if eq .Values.mode "entry" }}
      balance source
      option tcp-check
      default-server check inter {{ .Values.pool.checkIntervalMs }} fall {{ .Values.pool.checkFall }} rise {{ .Values.pool.checkRise }}
      server-template srv {{ .Values.pool.slotCount }} 0.0.0.0:443 check disabled
      {{- else }}
      {{- fail (printf "Unknown mode %q" .Values.mode) }}
      {{- end }}
