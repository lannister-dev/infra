image:
  repository: haproxy
  tag: "3.1-alpine"

mode: whitelist_entry

nodeSelector:
  role: vpn
  channel: prod
  traffic_role: whitelist_entry

tolerations:
  - key: dedicated
    value: vpn
    effect: NoSchedule

upstream: "0.0.0.0:443"

sharedHostPath: /var/lib/entry-shared

pool:
  slotCount: 20
  checkIntervalMs: 10000
  checkFall: 2
  checkRise: 2

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 25m
    memory: 32Mi
