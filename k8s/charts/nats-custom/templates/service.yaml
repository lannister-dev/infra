apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nats
  namespace: {{ .Release.Namespace }}
  labels:
    app: nats
spec:
  type: ClusterIP
  selector:
    app: nats
    release: {{ .Release.Name }}
  ports:
    - name: client
      port: {{ .Values.ports.client }}
      targetPort: client
    - name: monitoring
      port: {{ .Values.ports.monitoring }}
      targetPort: monitoring
    {{- if .Values.exporter.enabled }}
    - name: metrics
      port: {{ .Values.exporter.port }}
      targetPort: metrics
    {{- end }}
