# nats-custom: NATS with JetStream
# Single-node NATS with auth token and persistence

image:
  repository: nats
  tag: "2.11-alpine"
  pullPolicy: IfNotPresent

jetstream:
  enabled: true
  maxStore: 512MB
  maxMem: 128MB

# Secret containing NATS auth token (key: token)
auth:
  existingSecret: ""

storage:
  size: 5Gi
  storageClass: local-path

ports:
  client: 4222
  monitoring: 8222

# NATS exporter sidecar
exporter:
  enabled: true
  image:
    repository: natsio/prometheus-nats-exporter
    tag: "0.19.1"
  port: 7777

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
