# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
# ExternalSecret — syncs Vault KV → K8s Secret for control-api (prod)
#
# Vault path: kv/data/control-plane/prod/env
# K8s secret: control-api-prod-env in namespace vpn-prod
#
# Each field in the Vault KV secret becomes a key in the K8s Secret.
# ESO polls Vault every 5 minutes and updates the secret automatically.
# Pods pick up changes on next restart (or with reloader).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: control-api-prod-env
  namespace: vpn-prod
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: control-api-prod-env
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: control-plane/prod/env
        metadataPolicy: None
