apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: node-agent-dev-env
  namespace: vpn-dev
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: node-agent-dev-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: node-agent/dev/env
